<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#150830"/>
      <stop offset="100%" stop-color="#04020d"/>
    </radialGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg3)"/>

  <!-- Outer ring bright -->
  <circle cx="32" cy="32" r="27" fill="none" stroke="#b48fff" stroke-width="0.6" opacity="0.4"/>

  <!-- Middle ring -->
  <circle cx="32" cy="32" r="21" fill="none" stroke="#b48fff" stroke-width="0.8" opacity="0.7" filter="url(#glow3)"/>

  <!-- 6 rune marks around inner ring -->
  <g fill="#b48fff" opacity="0.9" filter="url(#glow3)">
    <!-- Top -->
    <rect x="30.5" y="9" width="3" height="6" rx="1.5"/>
    <!-- Bottom -->
    <rect x="30.5" y="49" width="3" height="6" rx="1.5"/>
    <!-- Top-right -->
    <rect x="30.5" y="9" width="3" height="6" rx="1.5" transform="rotate(60 32 32)"/>
    <!-- Bottom-right -->
    <rect x="30.5" y="9" width="3" height="6" rx="1.5" transform="rotate(120 32 32)"/>
    <!-- Top-left -->
    <rect x="30.5" y="9" width="3" height="6" rx="1.5" transform="rotate(240 32 32)"/>
    <!-- Bottom-left -->
    <rect x="30.5" y="9" width="3" height="6" rx="1.5" transform="rotate(300 32 32)"/>
  </g>

  <!-- Inner hex — centered at 32,32 radius 11 -->
  <polygon points="32,21 41.53,26.5 41.53,37.5 32,43 22.47,37.5 22.47,26.5" 
    fill="none" stroke="#7dd3fc" stroke-width="0.8" opacity="0.6"/>

  <!-- Center orb — centered at 32,32 -->
  <circle cx="32" cy="32" r="5" fill="#b48fff" opacity="0.25" filter="url(#bigglow)"/>
  <circle cx="32" cy="32" r="3" fill="#d4b0ff" opacity="0.9" filter="url(#glow3)"/>
  <circle cx="32" cy="32" r="1.5" fill="white" opacity="0.95"/>
</svg>
