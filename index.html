<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcanum</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="./style.css">
<script>
  // Apply saved theme immediately before first paint to avoid flash
  try {
    const s = JSON.parse(localStorage.getItem('arcanum-settings') || '{}');
    if (s.theme && s.theme !== 'nebula') {
      document.documentElement.setAttribute('data-theme', s.theme);
    }
  } catch(e) {}
</script>
<style>
  :root {
    --void: #04020d;
    --deep: #080418;
    --nebula1: #1a0a3a;
    --nebula2: #0d1a3a;
    --nebula3: #0a2440;
    --glow: #b48fff;
    --glow2: #7dd3fc;
    --glow3: #f0abfc;
    --star: #e8e0ff;
    --text: #d4c8ff;
    --text-dim: #7a6fa8;
    --text-bright: #f0ecff;
    --accent: #c084fc;
    --accent2: #38bdf8;
    --border: rgba(180,143,255,0.15);
    --border-bright: rgba(180,143,255,0.35);
    --card: rgba(15,8,40,0.7);
    --sidebar-w: 240px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Crimson Pro', Georgia, serif;
    background: var(--void);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
  }

  /* ── STARFIELD ── */
  #stars-canvas {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }

  /* ── NEBULA BG ── */
  .nebula-bg {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 30%, rgba(100,30,200,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 70%, rgba(20,80,180,0.15) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 60% 20%, rgba(200,60,180,0.08) 0%, transparent 60%),
      var(--void);
  }

  /* ── SIDEBAR ── */
  #sidebar {
    position: relative; z-index: 10;
    width: var(--sidebar-w);
    height: 100vh;
    background: rgba(8,4,24,0.92);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    backdrop-filter: blur(12px);
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 28px 20px 20px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-title {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.12em;
    background: linear-gradient(135deg, var(--glow), var(--glow2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
  }
  .sidebar-subtitle {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
  }

  .sidebar-search {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-search input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    outline: none;
    transition: border-color 0.2s;
  }
  .sidebar-search input:focus { border-color: var(--glow); }
  .sidebar-search input::placeholder { color: var(--text-dim); }

  .sidebar-tabs {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .tab-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 20px;
    cursor: pointer;
    font-size: 13.5px;
    color: var(--text-dim);
    transition: all 0.2s;
    border-left: 2px solid transparent;
    position: relative;
  }
  .tab-item:hover { color: var(--text); background: rgba(180,143,255,0.06); }
  .tab-item.active {
    color: var(--glow);
    background: rgba(180,143,255,0.1);
    border-left-color: var(--glow);
  }
  .tab-item .tab-icon { font-size: 14px; width: 18px; text-align: center; }
  .tab-count {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 1px 6px;
  }

  .sidebar-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
  }

  .btn-new-tab {
    width: 100%;
    padding: 9px;
    background: linear-gradient(135deg, rgba(180,143,255,0.15), rgba(125,211,252,0.1));
    border: 1px solid var(--border-bright);
    border-radius: 8px;
    color: var(--glow);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-new-tab:hover {
    background: linear-gradient(135deg, rgba(180,143,255,0.25), rgba(125,211,252,0.18));
    box-shadow: 0 0 16px rgba(180,143,255,0.2);
  }

  /* ── MAIN ── */
  #main {
    flex: 1;
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* ── TOP BAR ── */
  .topbar {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(8,4,24,0.6);
    backdrop-filter: blur(8px);
    position: sticky; top: 0; z-index: 5;
    flex-shrink: 0;
  }
  .topbar-title {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--text-bright);
    flex: 1;
  }
  .topbar-actions { display: flex; gap: 10px; align-items: center; }

  .btn {
    padding: 8px 18px;
    border-radius: 7px;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }
  .btn-primary {
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    color: #fff;
    box-shadow: 0 0 20px rgba(124,58,237,0.3);
  }
  .btn-primary:hover { box-shadow: 0 0 30px rgba(124,58,237,0.5); transform: translateY(-1px); }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border-bright);
    color: var(--text);
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.05); }
  .btn-danger {
    background: rgba(220,38,38,0.15);
    border: 1px solid rgba(220,38,38,0.3);
    color: #f87171;
  }
  .btn-danger:hover { background: rgba(220,38,38,0.25); }

  .view-toggle {
    display: flex; gap: 2px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 3px;
  }
  .view-btn {
    padding: 5px 10px;
    border-radius: 5px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
  }
  .view-btn.active { background: rgba(180,143,255,0.2); color: var(--glow); }

  /* ── CONTENT ── */
  .content {
    padding: 28px;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    scrollbar-width: none;
  }
  .content::-webkit-scrollbar { display: none; }

  /* ── HOME ── */
  .home-hero {
    text-align: center;
    padding: 60px 20px 40px;
  }
  .home-hero h1 {
    font-family: 'Cinzel', serif;
    font-size: 42px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--glow), var(--glow2), var(--glow3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
    line-height: 1.2;
  }
  .home-hero p {
    color: var(--text-dim);
    font-size: 17px;
    font-style: italic;
    max-width: 500px;
    margin: 0 auto 40px;
  }
  .home-greeting {
    font-family: 'Crimson Pro', serif;
    font-size: 16px;
    font-style: italic;
    color: var(--glow2);
    opacity: 0.8;
    letter-spacing: 0.02em;
    margin: 0 !important;
  }

  .home-stats {
    display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
    margin-bottom: 50px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 28px;
    text-align: center;
    backdrop-filter: blur(8px);
    min-width: 120px;
  }
  .stat-num {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    color: var(--glow);
    display: block;
  }
  .stat-label {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    font-family: 'JetBrains Mono', monospace;
  }

  .home-tabs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
    max-width: 900px;
    margin: 0 auto;
  }
  .home-tab-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.25s;
    text-align: center;
  }
  .home-tab-card:hover {
    border-color: var(--border-bright);
    background: rgba(180,143,255,0.1);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .home-tab-card .htc-icon { font-size: 22px; margin-bottom: 8px; }
  .home-tab-card .htc-name {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    color: var(--text-bright);
    letter-spacing: 0.05em;
  }
  .home-tab-card .htc-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty-state .es-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  .empty-state h3 {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    color: var(--text);
    margin-bottom: 8px;
  }
  .empty-state p { font-size: 14px; font-style: italic; }

  /* ── CARD GRID ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
  }
  .entry-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
  }
  .entry-card:hover {
    border-color: var(--border-bright);
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(180,143,255,0.1);
  }
  .entry-card-img {
    width: 100%; height: 140px;
    object-fit: cover;
    background: linear-gradient(135deg, var(--nebula1), var(--nebula2));
    display: flex; align-items: center; justify-content: center;
    font-size: 40px;
    color: rgba(180,143,255,0.3);
  }
  .entry-card-img img { width: 100%; height: 100%; object-fit: cover; }
  .entry-card-body { padding: 14px; }
  .entry-card-name {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    color: var(--text-bright);
    margin-bottom: 6px;
  }
  .entry-card-preview {
    font-size: 12.5px;
    color: var(--text-dim);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .entry-card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    background: rgba(180,143,255,0.1);
    color: var(--glow);
    border: 1px solid rgba(180,143,255,0.2);
  }

  /* ── TABLE ── */
  .entries-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
  }
  .entries-table th {
    text-align: left;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border-bright);
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--glow);
    font-weight: 600;
    white-space: nowrap;
  }
  .entries-table td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    vertical-align: middle;
  }
  .entries-table tr:hover td { background: rgba(180,143,255,0.04); cursor: pointer; }
  .entries-table td.cell-bool { text-align: center; }
  .bool-yes { color: #4ade80; } .bool-no { color: #f87171; }

  /* ── ENTRY DETAIL ── */
  .entry-detail { max-width: 800px; }
  .entry-detail-header {
    display: flex; gap: 24px; align-items: flex-start;
    margin-bottom: 28px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .entry-image-box {
    width: 120px; height: 120px; flex-shrink: 0;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: linear-gradient(135deg, var(--nebula1), var(--nebula2));
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; color: rgba(180,143,255,0.3);
  }
  .entry-image-box img { width: 100%; height: 100%; object-fit: cover; }
  .entry-title-area h2 {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    color: var(--text-bright);
    margin-bottom: 8px;
  }
  .entry-tab-badge {
    display: inline-flex;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 12px;
    background: rgba(180,143,255,0.12);
    color: var(--glow);
    border: 1px solid var(--border-bright);
  }

  .fields-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .field-block {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
  }
  .field-block-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 5px;
  }
  .field-block-value {
    font-size: 15px;
    color: var(--text-bright);
    line-height: 1.5;
    word-break: break-word;
  }
  .field-block.full-width { grid-column: 1 / -1; }
  .richtext-content {
    font-size: 15px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
  }

  /* ── MODALS ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .modal {
    background: linear-gradient(145deg, #0e0824, #060318);
    border: 1px solid var(--border-bright);
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 560px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 0 60px rgba(124,58,237,0.2);
    animation: slideUp 0.2s ease;
  }
  .modal-wide { max-width: 720px; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  .modal-title {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    color: var(--text-bright);
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .modal-title span { font-size: 20px; }

  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 6px;
  }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 12px;
    color: var(--text-bright);
    font-family: 'Crimson Pro', serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--glow);
    box-shadow: 0 0 12px rgba(180,143,255,0.15);
  }
  .form-select option { background: #0e0824; }

  /* ── CUSTOM DROPDOWN ── */
  .csel-wrap {
    position: relative;
    width: 100%;
    user-select: none;
  }
  .csel-trigger {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 12px;
    color: var(--text-bright);
    font-family: 'Crimson Pro', serif;
    font-size: 15px;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
    min-height: 40px;
  }
  .csel-trigger:hover { border-color: var(--border-bright); }
  .csel-trigger.open {
    border-color: var(--glow);
    box-shadow: 0 0 12px rgba(180,143,255,0.15);
    border-radius: 7px 7px 0 0;
  }
  .csel-trigger .csel-placeholder { color: var(--text-dim); font-style: italic; }
  .csel-arrow {
    font-size: 10px; color: var(--text-dim);
    transition: transform 0.2s;
    flex-shrink: 0; margin-left: 8px;
  }
  .csel-trigger.open .csel-arrow { transform: rotate(180deg); color: var(--glow); }
  .csel-dropdown {
    position: absolute; top: 100%; left: 0; right: 0; z-index: 200;
    background: #0e0824;
    border: 1px solid var(--glow);
    border-top: none;
    border-radius: 0 0 7px 7px;
    max-height: 200px; overflow-y: auto;
    box-shadow: 0 12px 32px rgba(0,0,0,0.7), 0 0 20px rgba(180,143,255,0.1);
    display: none;
  }
  .csel-dropdown.open { display: block; }
  .csel-option {
    padding: 9px 14px;
    cursor: pointer;
    font-family: 'Crimson Pro', serif;
    font-size: 15px;
    color: var(--text);
    transition: all 0.15s;
    border-bottom: 1px solid rgba(180,143,255,0.06);
  }
  .csel-option:last-child { border-bottom: none; }
  .csel-option:hover { background: rgba(180,143,255,0.12); color: var(--text-bright); }
  .csel-option.selected { background: rgba(180,143,255,0.18); color: var(--glow); }
  .csel-option.placeholder-opt { color: var(--text-dim); font-style: italic; }

  /* ── INLINE SELECT (schema builder) ── */
  .isel-wrap {
    position: relative;
    display: inline-block;
    min-width: 130px;
  }
  .isel-trigger {
    display: flex; align-items: center; justify-content: space-between; gap: 6px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-bright);
    white-space: nowrap;
    transition: border-color 0.15s;
    user-select: none;
  }
  .isel-trigger:hover { border-color: var(--border-bright); }
  .isel-trigger.open { border-color: var(--glow); border-radius: 6px 6px 0 0; }
  .isel-dim { color: var(--text-dim); font-style: italic; }
  .isel-arrow { font-size: 8px; color: var(--text-dim); transition: transform 0.15s; flex-shrink: 0; }
  .isel-trigger.open .isel-arrow { transform: rotate(180deg); color: var(--glow); }
  .isel-menu {
    display: none;
    position: absolute; top: 100%; left: 0; right: 0; z-index: 300;
    background: #0d0820;
    border: 1px solid var(--glow);
    border-top: none;
    border-radius: 0 0 6px 6px;
    max-height: 180px; overflow-y: auto;
    box-shadow: 0 8px 24px rgba(0,0,0,0.8);
  }
  .isel-menu.open { display: block; }
  .isel-opt {
    padding: 7px 10px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text);
    transition: background 0.1s;
    border-bottom: 1px solid rgba(180,143,255,0.06);
  }
  .isel-opt:last-child { border-bottom: none; }
  .isel-opt:hover { background: rgba(180,143,255,0.12); color: var(--text-bright); }
  .isel-opt.isel-selected { background: rgba(180,143,255,0.18); color: var(--glow); }
  .form-textarea { resize: vertical; min-height: 100px; font-size: 14px; line-height: 1.6; }

  /* ── RICH TEXT EDITOR ── */
  .rte-wrap {
    border: 1px solid var(--border);
    border-radius: 7px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .rte-wrap:focus-within {
    border-color: var(--glow);
    box-shadow: 0 0 12px rgba(180,143,255,0.15);
  }
  .rte-toolbar {
    display: flex; flex-wrap: wrap; gap: 2px;
    padding: 6px 8px;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid var(--border);
  }
  .rte-btn {
    background: transparent;
    border: 1px solid transparent;
    border-radius: 4px;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 12px;
    padding: 4px 7px;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1;
    transition: all 0.15s;
    min-width: 28px;
    text-align: center;
  }
  .rte-btn:hover { background: rgba(180,143,255,0.12); color: var(--glow); border-color: var(--border); }
  .rte-btn.active { background: rgba(180,143,255,0.2); color: var(--glow); border-color: var(--border-bright); }
  .rte-sep { width: 1px; background: var(--border); margin: 2px 4px; }
  .rte-editor {
    min-height: 140px;
    max-height: 340px;
    overflow-y: auto;
    padding: 12px 14px;
    background: rgba(255,255,255,0.02);
    color: var(--text-bright);
    font-family: 'Crimson Pro', serif;
    font-size: 15px;
    line-height: 1.75;
    outline: none;
    caret-color: var(--glow);
  }
  .rte-editor:empty::before {
    content: attr(data-placeholder);
    color: var(--text-dim);
    font-style: italic;
    pointer-events: none;
  }
  .rte-editor h1 { font-family: 'Cinzel', serif; font-size: 20px; color: var(--text-bright); margin: 8px 0 4px; }
  .rte-editor h2 { font-family: 'Cinzel', serif; font-size: 16px; color: var(--text-bright); margin: 6px 0 4px; }
  .rte-editor h3 { font-family: 'Cinzel', serif; font-size: 14px; color: var(--glow); margin: 6px 0 4px; }
  .rte-editor ul, .rte-editor ol { padding-left: 20px; }
  .rte-editor li { margin: 2px 0; }
  .rte-editor blockquote {
    border-left: 3px solid var(--glow);
    margin: 8px 0; padding: 4px 12px;
    color: var(--text-dim); font-style: italic;
    background: rgba(180,143,255,0.05);
    border-radius: 0 4px 4px 0;
  }
  .rte-editor hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
  .rte-editor strong { color: var(--text-bright); }
  .rte-editor em { color: var(--glow3); }
  .rte-editor a { color: var(--glow2); text-decoration: underline; }
  .rte-editor mark { background: rgba(180,143,255,0.25); color: var(--text-bright); border-radius: 2px; padding: 0 2px; }

  /* ── RTE FOCUS MODE ── */
  .rte-focus-overlay {
    position: fixed; inset: 0; z-index: 2000;
    background: rgba(4,2,13,0.92);
    backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    padding: 32px;
    animation: fadeIn 0.2s ease;
  }
  .rte-focus-box {
    width: 100%; max-width: 780px;
    height: 85vh;
    background: #07041a;
    border: 1px solid var(--border-bright);
    border-radius: 16px;
    box-shadow: 0 0 80px rgba(124,58,237,0.25);
    display: flex; flex-direction: column;
    overflow: hidden;
    animation: slideUp 0.2s ease;
  }
  .rte-focus-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .rte-focus-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-dim);
    letter-spacing: 0.12em; text-transform: uppercase;
  }
  .rte-focus-done {
    padding: 5px 14px;
    background: rgba(180,143,255,0.12);
    border: 1px solid var(--border-bright);
    border-radius: 6px;
    color: var(--glow);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.06em;
    cursor: pointer; transition: all 0.15s;
  }
  .rte-focus-done:hover { background: rgba(180,143,255,0.2); }
  .rte-focus-toolbar {
    padding: 6px 12px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; flex-wrap: wrap; gap: 2px;
    flex-shrink: 0;
  }
  .rte-focus-editor {
    flex: 1; overflow-y: auto;
    padding: 32px 48px;
    scrollbar-width: thin;
    scrollbar-color: rgba(180,143,255,0.2) transparent;
    font-family: 'Crimson Pro', serif;
    font-size: 18px; line-height: 1.9;
    color: var(--text);
    outline: none;
  }
  .rte-focus-editor:empty::before {
    content: attr(data-placeholder);
    color: var(--text-dim); pointer-events: none;
    font-style: italic;
  }
  .rte-focus-editor h1 { font-family: 'Cinzel', serif; font-size: 28px; color: var(--text-bright); margin: 16px 0 8px; }
  .rte-focus-editor h2 { font-family: 'Cinzel', serif; font-size: 22px; color: var(--text-bright); margin: 12px 0 6px; }
  .rte-focus-editor h3 { font-family: 'Cinzel', serif; font-size: 18px; color: var(--glow); margin: 10px 0 4px; }
  .rte-focus-editor ul, .rte-focus-editor ol { padding-left: 24px; }
  .rte-focus-editor li { margin: 4px 0; }
  .rte-focus-editor blockquote {
    border-left: 3px solid var(--glow); margin: 12px 0;
    padding: 8px 16px; color: var(--text-dim); font-style: italic;
    background: rgba(180,143,255,0.05); border-radius: 0 6px 6px 0;
  }
  .rte-focus-editor strong { color: var(--text-bright); }
  .rte-focus-editor em { color: var(--glow3); }
  .rte-focus-wc {
    flex-shrink: 0; padding: 6px 16px;
    border-top: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-dim);
    text-align: right;
  }
  /* Display richtext in entry view */
  .richtext-content h1 { font-family: 'Cinzel', serif; font-size: 20px; color: var(--text-bright); margin: 10px 0 4px; }
  .richtext-content h2 { font-family: 'Cinzel', serif; font-size: 16px; color: var(--text-bright); margin: 8px 0 4px; }
  .richtext-content h3 { font-family: 'Cinzel', serif; font-size: 14px; color: var(--glow); margin: 6px 0 4px; }
  .richtext-content ul, .richtext-content ol { padding-left: 20px; }
  .richtext-content li { margin: 2px 0; }
  .richtext-content blockquote {
    border-left: 3px solid var(--glow); margin: 8px 0; padding: 4px 12px;
    color: var(--text-dim); font-style: italic;
    background: rgba(180,143,255,0.05); border-radius: 0 4px 4px 0;
  }
  .richtext-content strong { color: var(--text-bright); }
  .richtext-content em { color: var(--glow3); }
  .richtext-content a { color: var(--glow2); }
  .richtext-content mark { background: rgba(180,143,255,0.25); color: var(--text-bright); border-radius: 2px; padding: 0 2px; }
  .form-input[type=number] { font-family: 'JetBrains Mono', monospace; font-size: 13px; }
  .form-input[type=checkbox] { width: auto; margin-right: 8px; accent-color: var(--accent); }

  .modal-footer {
    display: flex; justify-content: flex-end; gap: 10px;
    margin-top: 24px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  /* Schema builder */
  .schema-fields { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
  .schema-field-row {
    display: flex; gap: 8px; align-items: center;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .schema-field-row input, .schema-field-row select {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 5px 8px;
    color: var(--text-bright);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    outline: none;
  }
  .schema-field-row input { flex: 1; }
  .schema-field-row select { min-width: 130px; }
  .schema-field-row input:focus, .schema-field-row select:focus { border-color: var(--glow); }
  .btn-remove-field {
    background: none; border: none; color: #f87171;
    cursor: pointer; font-size: 16px; padding: 2px 6px;
    border-radius: 4px; transition: background 0.15s;
  }
  .btn-remove-field:hover { background: rgba(248,113,113,0.1); }
  .btn-add-field {
    background: rgba(255,255,255,0.03);
    border: 1px dashed var(--border-bright);
    border-radius: 7px;
    padding: 8px;
    color: var(--text-dim);
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    width: 100%;
    transition: all 0.2s;
  }
  .btn-add-field:hover { background: rgba(180,143,255,0.07); color: var(--glow); border-color: var(--glow); }

  /* Dropdown options editor */
  .dropdown-opts-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-dim);
    margin-top: 4px;
  }
  .dropdown-opts-input {
    width: 100%; margin-top: 4px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border); border-radius: 5px;
    padding: 4px 8px; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    outline: none;
  }

  /* Relation field */
  .relation-select {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 12px;
    color: var(--text-bright);
    font-family: 'Crimson Pro', serif;
    font-size: 15px;
    outline: none;
  }

  /* Breadcrumb */
  .breadcrumb {
    display: flex; align-items: center; gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; color: var(--text-dim);
    margin-bottom: 20px;
  }
  .breadcrumb span { cursor: pointer; }
  .breadcrumb span:hover { color: var(--glow); }
  .breadcrumb .sep { color: var(--border-bright); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(180,143,255,0.2); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(180,143,255,0.35); }

  /* Glow pulse on active nav */
  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 0 8px rgba(180,143,255,0.3); }
    50% { box-shadow: 0 0 16px rgba(180,143,255,0.6); }
  }

  .relation-badge {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 8px;
    background: rgba(56,189,248,0.12);
    color: var(--glow2);
    border: 1px solid rgba(56,189,248,0.2);
    cursor: pointer;
  }
  .relation-badge:hover { background: rgba(56,189,248,0.22); }

  /* ── WORLD CARDS ── */
  .worlds-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .world-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    cursor: pointer;
    display: flex; align-items: flex-start; gap: 16px;
    transition: all 0.25s;
    position: relative;
  }
  .world-card:hover {
    border-color: var(--border-bright);
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(180,143,255,0.1);
  }
  .world-card-icon { font-size: 36px; flex-shrink: 0; line-height: 1; margin-top: 2px; }
  .world-card-body { flex: 1; min-width: 0; }
  .world-card-name {
    font-family: 'Cinzel', serif;
    font-size: 16px; font-weight: 600;
    color: var(--text-bright);
    margin-bottom: 5px;
  }
  .world-card-desc {
    font-size: 13px; color: var(--text-dim);
    font-style: italic; line-height: 1.5;
    margin-bottom: 8px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .world-card-meta {
    display: flex; gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  .world-card-edit {
    position: absolute; top: 12px; right: 12px;
    background: transparent; border: 1px solid var(--border);
    color: var(--text-dim); border-radius: 5px;
    padding: 3px 7px; cursor: pointer; font-size: 13px;
    transition: all 0.15s; opacity: 0;
  }
  .world-card:hover .world-card-edit { opacity: 1; }
  .world-card-edit:hover { background: rgba(180,143,255,0.1); color: var(--glow); border-color: var(--border-bright); }

  .world-detail-header {
    display: flex; align-items: flex-start; gap: 20px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .world-detail-icon { font-size: 52px; line-height: 1; flex-shrink: 0; }

  /* ── ICON PICKER ── */
  .icon-picker {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-top: 6px;
  }
  .icon-opt {
    font-size: 20px;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 7px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    background: rgba(255,255,255,0.03);
  }
  .icon-opt:hover { background: rgba(180,143,255,0.12); border-color: var(--border-bright); }
  .icon-opt.selected { background: rgba(180,143,255,0.2); border-color: var(--glow); box-shadow: 0 0 8px rgba(180,143,255,0.3); }

  /* ── SETUP SCREEN ── */
  #setup-screen {
    position: fixed; inset: 0; z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    background: var(--void);
    padding: 20px;
  }
  .setup-box {
    width: 100%; max-width: 480px;
    background: linear-gradient(145deg, #0e0824, #060318);
    border: 1px solid var(--border-bright);
    border-radius: 20px;
    padding: 40px 36px;
    box-shadow: 0 0 80px rgba(124,58,237,0.25), 0 0 160px rgba(124,58,237,0.1);
    animation: slideUp 0.3s ease;
  }
  .setup-logo {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--glow), var(--glow2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }
  .setup-subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 999;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 10px 18px;
    border-radius: 8px;
    border: 1px solid var(--border-bright);
    background: rgba(14,8,36,0.95);
    color: var(--text-bright);
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
    max-width: 300px;
  }
  #toast.show { opacity: 1; }
  #toast.success { border-color: rgba(74,222,128,0.4); color: #86efac; }
  #toast.error { border-color: rgba(248,113,113,0.4); color: #fca5a5; }

  /* ── THEME TRANSITION ── */
  .theme-transition {
    position: fixed; inset: 0; z-index: 99999;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px;
    background: var(--void);
    animation: themeFadeIn 0.25s ease forwards;
  }
  @keyframes themeFadeIn { from { opacity:0 } to { opacity:1 } }
  @keyframes themeFadeOut { from { opacity:1 } to { opacity:0 } }

  .theme-transition-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--glow);
    opacity: 0.8;
  }
  .theme-transition-name {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--text-bright);
    letter-spacing: 0.08em;
  }
  .theme-transition-bar-wrap {
    width: 260px;
    height: 2px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
  }
  .theme-transition-bar {
    height: 100%;
    width: 0%;
    background: var(--glow);
    box-shadow: 0 0 10px var(--glow);
    border-radius: 2px;
    transition: width 2.7s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .theme-transition-status {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    height: 14px;
  }


  .sidebar-settings {
    padding: 8px 16px 4px;
    border-top: 1px solid var(--border);
  }
  .btn-settings {
    width: 100%;
    padding: 7px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    display: flex; align-items: center; gap: 8px;
  }
  .btn-settings:hover { color: var(--text); border-color: var(--border-bright); background: rgba(255,255,255,0.03); }

  /* ── SETTINGS PANEL ── */
  .settings-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }

  .settings-box {
    width: 100%; max-width: 820px;
    height: 80vh;
    background: linear-gradient(145deg, #0e0824, #060318);
    border: 1px solid var(--border-bright);
    border-radius: 18px;
    box-shadow: 0 0 80px rgba(124,58,237,0.2);
    display: flex;
    overflow: hidden;
    animation: slideUp 0.2s ease;
  }

  .settings-nav {
    width: 180px; flex-shrink: 0;
    border-right: 1px solid var(--border);
    padding: 24px 0;
    display: flex; flex-direction: column;
    background: rgba(0,0,0,0.2);
  }

  .settings-nav-title {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    color: var(--text-bright);
    letter-spacing: 0.08em;
    padding: 0 20px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }

  .settings-nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-dim); cursor: pointer;
    transition: all 0.15s;
    border-left: 2px solid transparent;
  }
  .settings-nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .settings-nav-item.active { color: var(--text-bright); border-left-color: var(--glow); background: rgba(180,143,255,0.06); }

  .settings-dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  }

  .settings-content {
    flex: 1; position: relative;
    overflow: hidden;
    scrollbar-width: none;
    min-height: 0;
    display: flex; flex-direction: column;
  }
  .settings-content::-webkit-scrollbar { display: none; width: 0; }

  /* Hide scrollbar visually but keep scrolling functional */
  .settings-box ::-webkit-scrollbar { width: 0 !important; height: 0 !important; }
  .settings-box { scrollbar-width: none !important; }
  .settings-content { scrollbar-width: none !important; }
  .settings-section { scrollbar-width: none !important; }
  .settings-overlay iframe::-webkit-scrollbar { width: 0; }
  .settings-overlay iframe { scrollbar-width: none; }

  .settings-section {
    padding: 32px;
    overflow-y: auto;
    scrollbar-width: none;
    flex: 1;
  }
  .settings-section::-webkit-scrollbar { display: none; }

  .settings-close {
    position: absolute; top: 16px; right: 16px;
    background: transparent; border: 1px solid var(--border);
    color: var(--text-dim); font-size: 13px;
    padding: 4px 8px; border-radius: 6px; cursor: pointer;
    transition: all 0.15s; z-index: 10;
  }
  .settings-close:hover { color: var(--text); border-color: var(--border-bright); }

  /* iframe panes */
  .settings-iframe {
    width: 100%; height: 100%;
    border: none; background: transparent;
    opacity: 0;
    transition: opacity 0.3s ease;
    display: block;
    overflow: hidden;
  }
  .settings-iframe.loaded { opacity: 1; }
  .iframe-wrap {
    position: relative;
    width: 100%; height: 100%;
    flex: 1;
    overflow: hidden;
  }
  .settings-section-title {
    font-family: 'Cinzel', serif;
    font-size: 18px; color: var(--text-bright);
    margin-bottom: 24px; padding-bottom: 12px;

<script>
  // Auto-detect favicon from assets/images/
  (function() {
    const exts = ['svg', 'png', 'ico', 'jpg', 'jpeg', 'webp', 'gif'];
    const base = './assets/images/favicon.';
    let idx = 0;
    const link = document.createElement('link');
    link.rel = 'icon';
    document.head.appendChild(link);
    function tryNext() {
      if (idx >= exts.length) return;
      const url = base + exts[idx++];
      const img = new Image();
      img.onload = () => { link.href = url; };
      img.onerror = tryNext;
      img.src = url;
    }
    tryNext();
  })();
</script>

<script>
// ── UTILS (early, needed by console) ──
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function uid() { return Math.random().toString(36).slice(2,10)+Date.now().toString(36); }

// ── SESSION CONSOLE ──
const sessionLog = [];

(function interceptConsole() {
  const levels = ['error', 'warn', 'info'];
  levels.forEach(level => {
    if (typeof console[level] !== 'function') return;
    const orig = console[level].bind(console);
    console[level] = (...args) => {
      try { orig(...args); } catch(e) {}
      const msg = args.map(a => {
        try { return typeof a === 'object' ? JSON.stringify(a) : String(a); }
        catch(e) { return String(a); }
      }).join(' ');
      sessionLog.push({ level, msg, time: new Date().toLocaleTimeString() });
      updateConsoleBadge();
      if (document.getElementById('settings-console-log')) renderSettingsConsole();
    };
  });

  window.addEventListener('error', e => {
    sessionLog.push({ level: 'error', msg: e.message + (e.filename ? ` (${e.filename}:${e.lineno})` : ''), time: new Date().toLocaleTimeString() });
    updateConsoleBadge();
  });
  window.addEventListener('unhandledrejection', e => {
    sessionLog.push({ level: 'error', msg: 'Unhandled promise rejection: ' + (e.reason?.message || String(e.reason)), time: new Date().toLocaleTimeString() });
    updateConsoleBadge();
  });
})();

function updateConsoleBadge() {
  const badge = document.getElementById('console-badge');
  const btn = document.getElementById('settings-btn');
  const dot = document.getElementById('settings-console-dot');
  if (!badge || !btn) return;
  const errors = sessionLog.filter(e => e.level === 'error').length;
  if (errors > 0) {
    badge.textContent = errors > 99 ? '99+' : errors;
    badge.style.display = '';
    btn.classList.add('has-errors');
    if (dot) { dot.style.background = '#f87171'; dot.style.boxShadow = '0 0 5px #f87171'; }
  } else {
    badge.style.display = 'none';
    btn.classList.remove('has-errors');
    if (dot) { dot.style.background = '#fbbf24'; dot.style.boxShadow = '0 0 5px #fbbf24'; }
  }
}


function clearConsole() {
  sessionLog.length = 0;
  updateConsoleBadge();
  renderConsoleLog();
  renderSettingsConsole();
}

function renderConsoleLog() {
  const el = document.getElementById('console-log');
  if (!el) return;
  if (sessionLog.length === 0) {
    el.innerHTML = '<div class="console-empty">No errors this session.</div>';
    return;
  }
  el.innerHTML = [...sessionLog].reverse().map(e => `
    <div class="console-entry">
      <span class="console-time">${e.time}</span>
      <span class="console-level ${e.level}">${e.level.toUpperCase()}</span>
      <span class="console-msg">${escHtml(e.msg)}</span>
    </div>`).join('');
}

// ── STATE ──
let db = { worlds: [], tabs: [], entries: {} };
let view = { page: 'worlds', worldId: null, tabId: null, entryId: null, displayMode: 'card' };
let appSettings = {
  displayName: 'User',
  defaultDisplayMode: 'card',
  theme: 'nebula',
};

function loadAppSettings() {
  try {
    const saved = localStorage.getItem('arcanum-settings');
    if (saved) appSettings = { ...appSettings, ...JSON.parse(saved) };
  } catch(e) {}
  applyTheme(appSettings.theme);
}

function saveAppSettings() {
  localStorage.setItem('arcanum-settings', JSON.stringify(appSettings));
}

function selectTheme(theme) {
  if (theme === appSettings.theme) return;

  const themeInfo = THEMES.find(t => t.id === theme) || { name: theme };
  const steps = [
    'Initialising renderer...',
    'Loading colour palette...',
    'Applying variables...',
    'Rebuilding interface...',
    'Finalising...',
  ];

  // Apply theme to DOM immediately so the overlay uses new theme colours
  applyTheme(theme);

  // Build overlay
  const overlay = document.createElement('div');
  overlay.className = 'theme-transition';
  overlay.innerHTML = `
    <div class="theme-transition-label">Applying Theme</div>
    <div class="theme-transition-name">${escHtml(themeInfo.name)}</div>
    <div class="theme-transition-bar-wrap">
      <div class="theme-transition-bar" id="tt-bar"></div>
    </div>
    <div class="theme-transition-status" id="tt-status">${steps[0]}</div>
  `;
  document.body.appendChild(overlay);

  // Start bar fill after a tick so transition fires
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.getElementById('tt-bar').style.width = '100%';
    });
  });

  // Cycle through status messages
  steps.forEach((s, i) => {
    setTimeout(() => {
      const el = document.getElementById('tt-status');
      if (el) el.textContent = s;
    }, i * (2800 / steps.length));
  });

  // Fade out and remove after 3s
  setTimeout(() => {
    overlay.style.animation = 'themeFadeOut 0.4s ease forwards';
    setTimeout(() => {
      overlay.remove();
      // Update theme cards active state
      document.querySelectorAll('.theme-card').forEach(c => {
        c.classList.toggle('active', c.getAttribute('onclick') === `selectTheme('${theme}')`);
      });
    }, 400);
  }, 3000);
}

function applyTheme(theme) {
  appSettings.theme = theme;
  // 'nebula' is the default baked into HTML, just remove attribute
  if (!theme || theme === 'nebula') {
    document.documentElement.removeAttribute('data-theme');
  } else {
    document.documentElement.setAttribute('data-theme', theme);
  }
  // Broadcast to iframes
  document.querySelectorAll('.settings-iframe').forEach(iframe => {
    sendThemeToIframe(iframe);
  });
  saveAppSettings();
}
let sbClient = null;
let tursoClient = null;
let dbProvider = null; // 'supabase' | 'turso'
let dbConnected = false;

// ── CREDENTIALS ──
function getCreds() {
  try {
    return {
      provider: localStorage.getItem('arcanum-db-provider') || '',
      sbUrl: localStorage.getItem('arcanum-sb-url') || '',
      sbKey: localStorage.getItem('arcanum-sb-key') || '',
      tursoUrl: localStorage.getItem('arcanum-turso-url') || '',
      tursoToken: localStorage.getItem('arcanum-turso-token') || '',
    };
  } catch(e) { return {}; }
}
function saveCreds(provider, data) {
  localStorage.setItem('arcanum-db-provider', provider);
  if (provider === 'supabase') {
    localStorage.setItem('arcanum-sb-url', data.url);
    localStorage.setItem('arcanum-sb-key', data.key);
  } else if (provider === 'turso') {
    localStorage.setItem('arcanum-turso-url', data.url);
    localStorage.setItem('arcanum-turso-token', data.token);
  }
}

// ── TURSO HTTP API ──
async function tursoQuery(url, token, sql, args = []) {
  const httpUrl = url.replace('libsql://', 'https://').replace('wss://', 'https://');
  try {
    const resp = await fetch(`${httpUrl}/v2/pipeline`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ requests: [{ type: 'execute', stmt: { sql, args: args.map(a => ({ type: typeof a === 'number' ? 'integer' : 'text', value: String(a ?? '') })) } }, { type: 'close' }] })
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.message || 'Turso request failed');
    const result = data.results?.[0];
    if (result?.type === 'error') throw new Error(result.error?.message || 'Query error');
    return { data: result?.response?.result, error: null };
  } catch(e) { return { data: null, error: e.message }; }
}

async function tursoExec(sql, args = []) {
  if (!tursoClient) return;
  const { error } = await tursoQuery(tursoClient.url, tursoClient.token, sql, args);
  if (error) throw new Error(error);
}

async function tursoSelect(sql, args = []) {
  if (!tursoClient) return [];
  const { data, error } = await tursoQuery(tursoClient.url, tursoClient.token, sql, args);
  if (error) throw new Error(error);
  const cols = data?.cols?.map(c => c.name) || [];
  return (data?.rows || []).map(row => {
    const obj = {};
    cols.forEach((c, i) => { obj[c] = row[i]?.value ?? null; });
    return obj;
  });
}

async function ensureTursoTables(url, token) {

  for (const sql of sqls) {

}

async function ensureSupabaseTables(client) {

}

// Retry helper for flaky network (Replit/Supabase cold starts)
async function withRetry(fn, retries = 3, delayMs = 800) {
  for (let i = 0; i <= retries; i++) {
    try {
      return await fn();
    } catch(e) {
      const msg = e?.message || e?.details || String(e);
      const isNetworkErr = msg.includes('fetch') || msg.includes('network') || msg.includes('Failed to fetch') || msg.includes('NetworkError');
      if (isNetworkErr && i < retries) {
        await new Promise(r => setTimeout(r, delayMs * (i + 1)));
      } else {
        throw e;
      }
    }
  }
}

async function loadDB() {
  try {
    await withRetry(async () => {
      if (dbProvider === 'supabase') {
        const { data: worlds, error: ew } = await sbClient.from('arcanum_worlds').select('*');
        if (ew) throw ew;
        const { data: tabs, error: e1 } = await sbClient.from('arcanum_tabs').select('*');
        if (e1) throw e1;
        const { data: entries, error: e2 } = await sbClient.from('arcanum_entries').select('*');
        if (e2) throw e2;
        db.worlds = (worlds||[]).map(w => ({ id: w.id, name: w.name, description: w.description||'', icon: w.icon||'🌍' }));
        db.tabs = (tabs||[]).map(t => ({ id: t.id, worldId: t.world_id, name: t.name, icon: t.icon||'', fields: t.fields||[] }));
        db.entries = {};
        db.tabs.forEach(t => { db.entries[t.id] = []; });
        (entries||[]).forEach(e => {
          if (!db.entries[e.tab_id]) db.entries[e.tab_id] = [];
          db.entries[e.tab_id].push({ id: e.id, data: e.data||{}, tags: e.tags||[], status: e.status||'draft', starred: !!e.starred, createdAt: e.created_at ? new Date(e.created_at).getTime() : Date.now() });
        });
      } else if (dbProvider === 'turso') {
      const worlds = await tursoSelect(`SELECT * FROM arcanum_worlds`);
      const tabs = await tursoSelect(`SELECT * FROM arcanum_tabs`);
      const entries = await tursoSelect(`SELECT * FROM arcanum_entries`);
      db.worlds = worlds.map(w => ({ id: w.id, name: w.name, description: w.description||'', icon: w.icon||'🌍' }));
      db.tabs = tabs.map(t => ({ id: t.id, worldId: t.world_id, name: t.name, icon: t.icon||'', fields: JSON.parse(t.fields||'[]') }));
      db.entries = {};
      db.tabs.forEach(t => { db.entries[t.id] = []; });
      entries.forEach(e => {
        if (!db.entries[e.tab_id]) db.entries[e.tab_id] = [];
        db.entries[e.tab_id].push({ id: e.id, data: JSON.parse(e.data||'{}'), tags: JSON.parse(e.tags||'[]'), status: e.status||'draft', starred: e.starred==='1'||e.starred===true, createdAt: e.created_at ? new Date(e.created_at).getTime() : Date.now() });
      });
    }
    });
  } catch(e) { console.error('Load error: ' + (e?.message || e?.details || JSON.stringify(e))); showToast('Load failed: ' + e.message, 'error'); }
}

function copySetupSQL(provider) {
  const sql = SETUP_SQL[provider];
  if (!sql) return;
  navigator.clipboard.writeText(sql).then(() => {
    showToast('SQL copied to clipboard ✓', 'success');
  }).catch(() => {
    // Fallback for browsers that block clipboard
    const ta = document.createElement('textarea');
    ta.value = sql;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('SQL copied to clipboard ✓', 'success');
  });
}

// ── TOAST ──
let toastTimer = null;
function showToast(msg, type = '') {
  const text = typeof msg === 'object' ? (msg?.message || msg?.details || JSON.stringify(msg)) : String(msg);
  if (type === 'error') console.error(text);
  else if (type === 'warn') console.warn(text);
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = text;
  t.className = 'show' + (type ? ' ' + type : '');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 3000);
}

(function stars() {
  const c = document.getElementById('stars-canvas');
  const ctx = c.getContext('2d');
  let pts = [];
  function resize() {
    c.width = window.innerWidth; c.height = window.innerHeight;
    pts = Array.from({length: 160}, () => ({
      x: Math.random() * c.width, y: Math.random() * c.height,
      r: Math.random() * 1.2 + 0.2,
      a: Math.random(), da: (Math.random() - 0.5) * 0.005
    }));
  }
  function draw() {
    ctx.clearRect(0,0,c.width,c.height);
    pts.forEach(p => {
      p.a = Math.max(0.1, Math.min(1, p.a + p.da));
      if (p.a <= 0.1 || p.a >= 1) p.da *= -1;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(232,224,255,${p.a * 0.7})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize(); draw();
  window.addEventListener('resize', resize);
})();

      <button class="view-btn ${view.displayMode==='card'?'active':''}" onclick="setDisplayMode('card')" title="Cards">⊞</button>
      <button class="view-btn ${view.displayMode==='table'?'active':''}" onclick="setDisplayMode('table')" title="Table">☰</button>
    </div>
    <button class="btn btn-ghost" onclick="openEditTabModal('${tab.id}')">Edit Schema</button>
    <button class="btn btn-primary" onclick="openNewEntryModal('${tab.id}')">+ New Entry</button>
  `;
  const content = document.getElementById('content');
  if (entries.length === 0) {
    content.innerHTML = `<div class="empty-state">
      <div class="es-icon">${getIcon(tab)}</div>
      <h3>No ${escHtml(tab.name)} yet</h3>
      <p style="margin-bottom:20px">The cosmos awaits your first entry.</p>
      <button class="btn btn-primary" onclick="openNewEntryModal('${tab.id}')">+ Add First Entry</button>
    </div>`;
    return;
  }
  if (view.displayMode === 'card') renderCards(tab, entries, content);
  else renderTable(tab, entries, content);
}

function setDisplayMode(m) { view.displayMode = m; render(); }

function getNameField(tab, entry) {
  const nameField = tab.fields.find(f=>f.name.toLowerCase()==='name') || tab.fields[0];
  return nameField ? (entry.data[nameField.id] || '—') : '—';
}
function getImageField(tab, entry) {
  const imgField = tab.fields.find(f=>f.type==='image');
  return imgField ? entry.data[imgField.id] : null;
}
function getDescField(tab, entry) {
  const df = tab.fields.find(f=>f.type==='richtext');
  if (!df) return null;
  const html = entry.data[df.id] || '';
  // Strip tags for plain preview
  return html.replace(/<[^>]*>/g,' ').replace(/\s+/g,' ').trim();
}
function getTags(entry) { return entry.tags || []; }

function renderCards(tab, entries, el) {
  const cards = entries.map(e => {
    const name = getNameField(tab, e);
    const img = getImageField(tab, e);
    const desc = getDescField(tab, e);
    const tags = getTags(e);
    const imgHtml = img
      ? `<div class="entry-card-img"><img src="${escHtml(img)}" onerror="this.style.display='none'"></div>`
      : `<div class="entry-card-img">${getIcon(tab)}</div>`;
    const tagsHtml = tags.length ? `<div class="entry-card-tags">${tags.map(t=>`<span class="tag">${escHtml(t)}</span>`).join('')}</div>` : '';
    return `<div class="entry-card" onclick="goEntry('${tab.id}','${e.id}')">
      ${imgHtml}
      <div class="entry-card-body">
        <div class="entry-card-name">${escHtml(name)}</div>
        ${desc?`<div class="entry-card-preview">${escHtml(desc)}</div>`:''}
        ${tagsHtml}
      </div>
      <div class="entry-card-footer">
        ${statusHtml(e.status||'draft')}
        <button class="entry-card-star ${e.starred?'starred':''}" onclick="event.stopPropagation();toggleStar('${tab.id}','${e.id}')" title="${e.starred?'Unstar':'Star'}">${e.starred?'★':'☆'}</button>
      </div>
    </div>`;
  }).join('');
  el.innerHTML = `<div class="cards-grid">${cards}</div>`;
}

function renderTable(tab, entries, el) {
  const cols = tab.fields.slice(0, 6); // limit cols
  const headers = `<tr><th>#</th>${cols.map(f=>`<th>${escHtml(f.name)}</th>`).join('')}<th>Tags</th></tr>`;
  const rows = entries.map((e,i) => {
    const cells = cols.map(f => {
      let v = e.data[f.id];
      if (v === undefined || v === null || v === '') return `<td>—</td>`;
      if (f.type === 'bool') return `<td class="cell-bool">${v?'<span class="bool-yes">✓</span>':'<span class="bool-no">✗</span>'}</td>`;
      if (f.type === 'image') return `<td><img src="${escHtml(v)}" style="width:36px;height:36px;object-fit:cover;border-radius:4px;" onerror="this.style.display='none'"></td>`;
      if (f.type === 'relation') {
        const rel = getRelatedEntry(f.relTab, v);
        return `<td><span class="relation-badge" onclick="event.stopPropagation();goEntry('${f.relTab}','${v}')">${escHtml(rel)}</span></td>`;
      }
      const sv = String(v).slice(0,60);
      return `<td>${escHtml(sv)}</td>`;
    }).join('');
    const tags = (e.tags||[]).map(t=>`<span class="tag">${escHtml(t)}</span>`).join('');
    return `<tr onclick="goEntry('${tab.id}','${e.id}')">
      <td style="color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:11px">${i+1}</td>
      ${cells}<td>${tags}</td></tr>`;
  }).join('');
  el.innerHTML = `<div style="overflow-x:auto"><table class="entries-table"><thead>${headers}</thead><tbody>${rows}</tbody></table></div>`;
}

function getRelatedEntry(tabId, entryId) {
  if (!tabId || !entryId) return '—';
  const tab = db.tabs.find(t=>t.id===tabId);
  const entry = (db.entries[tabId]||[]).find(e=>e.id===entryId);
  if (!tab || !entry) return '?';
  return getNameField(tab, entry);
}

function statusHtml(status) {
  const map = {
    draft:      { label: 'Draft',       cls: 'status-draft' },
    planned:    { label: 'Planned',     cls: 'status-planned' },
    inprogress: { label: 'In Progress', cls: 'status-inprogress' },
    complete:   { label: 'Complete',    cls: 'status-complete' },
  };
  const s = map[status] || map.draft;
  return `<span class="status-badge ${s.cls}"><span class="status-dot"></span>${s.label}</span>`;
}

function resolveEntryLinks(html) {
  // Replace @[Entry Name](tabId:entryId) with clickable links
  return html.replace(/@\[([^\]]+)\]\(([^:]+):([^)]+)\)/g, (_, name, tabId, entryId) =>
    `<span class="entry-link" onclick="goEntry('${tabId}','${entryId}')">${escHtml(name)}</span>`
  );
}

function renderEntry() {
  const tab = db.tabs.find(t=>t.id===view.tabId);
  const entry = (db.entries[view.tabId]||[]).find(e=>e.id===view.entryId);
  if (!tab||!entry) return goTab(view.tabId);
  const name = getNameField(tab, entry);
  const img = getImageField(tab, entry);

  document.getElementById('topbar-title').textContent = name;
  document.getElementById('topbar-actions').innerHTML = `
    <button class="star-btn ${entry.starred?'starred':''}" onclick="toggleStar('${tab.id}','${entry.id}')" title="${entry.starred?'Unstar':'Star'}">${entry.starred?'★':'☆'}</button>
    <button class="btn btn-ghost" onclick="duplicateEntry('${tab.id}','${entry.id}')">Duplicate</button>
    <button class="btn btn-ghost" onclick="openEditEntryModal('${tab.id}','${entry.id}')">Edit</button>
    <button class="btn btn-danger" onclick="deleteEntry('${tab.id}','${entry.id}')">Delete</button>
  `;

  const imgHtml = img
    ? `<div class="entry-image-box"><img src="${escHtml(img)}" onerror="this.style.display='none'"></div>`
    : `<div class="entry-image-box">${getIcon(tab)}</div>`;
  const tags = (entry.tags||[]).map(t=>`<span class="tag">${escHtml(t)}</span>`).join('');

  const fieldBlocks = tab.fields.map(f => {
    let v = entry.data[f.id];
    if (v === undefined || v === null || v === '') return '';
    let valHtml = '';
    if (f.type === 'bool') valHtml = v ? '<span class="bool-yes">Yes</span>' : '<span class="bool-no">No</span>';
    else if (f.type === 'image') valHtml = `<img src="${escHtml(v)}" style="max-width:100%;border-radius:6px;margin-top:4px;" onerror="this.style.display='none'">`;
    else if (f.type === 'richtext') valHtml = `<div class="richtext-content">${resolveEntryLinks(String(v))}</div>`;
    else if (f.type === 'relation') {
      const rel = getRelatedEntry(f.relTab, v);
      valHtml = `<span class="relation-badge" onclick="goEntry('${f.relTab}','${v}')">${escHtml(rel)} ↗</span>`;
    }
    else valHtml = `<span class="field-block-value">${escHtml(String(v))}</span>`;
    const isRich = f.type==='richtext';
    return `<div class="field-block${isRich?' full-width':''}">
      <div class="field-block-label">${escHtml(f.name)}</div>
      ${valHtml}
    </div>`;
  }).join('');

  const world = db.worlds.find(w => w.id === view.worldId);
  document.getElementById('content').innerHTML = `
    <div class="entry-detail">
      <div class="breadcrumb">
        <span onclick="goWorlds()">Worlds</span><span class="sep">›</span>
        <span onclick="goWorld('${view.worldId}')">${escHtml(world?.name||'')}</span><span class="sep">›</span>
        <span onclick="goTab('${tab.id}')">${escHtml(tab.name)}</span><span class="sep">›</span>
        <span style="color:var(--glow)">${escHtml(name)}</span>
      </div>
      <div class="entry-detail-header">
        ${imgHtml}
        <div class="entry-title-area">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px">
            <div class="entry-tab-badge">${escHtml(tab.name)}</div>
            ${statusHtml(entry.status||'draft')}
          </div>
          <h2>${escHtml(name)}</h2>
          ${tags ? `<div class="entry-card-tags" style="margin-top:8px">${tags}</div>` : ''}
        </div>
      </div>
      <div class="fields-grid">${fieldBlocks}</div>
    </div>`;
}

// ── MODALS ──
function closeModal() { document.getElementById('modal-container').innerHTML = ''; }

function openNewTabModal(prefill = null) {
  const tab = prefill || { name: '', fields: [] };
  showTabModal('New Tab', tab, false);
}
function openEditTabModal(tabId) {
  const tab = db.tabs.find(t=>t.id===tabId);
  if (!tab) return;
  showTabModal('Edit Schema — ' + tab.name, JSON.parse(JSON.stringify(tab)), true, tabId);
}

let modalFields = [];
function showTabModal(title, tab, isEdit, tabId) {
  modalFields = isEdit ? tab.fields.map(f=>({...f})) : [];
  renderTabModal(title, tab, isEdit, tabId);
}

function renderTabModal(title, tab, isEdit, tabId) {
  const fieldsHtml = buildSchemaFieldsHtml(isEdit, tabId);
  const currentIcon = tab.icon || getIcon(tab) || '📁';

  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal modal-wide">
        <div class="modal-title"><span>🗂</span> ${escHtml(title)}</div>
        <div class="form-group">
          <label class="form-label">Tab Name</label>
          <div style="display:flex;gap:8px;align-items:center">
            <button class="tab-icon-btn" id="tab-icon-btn" onclick="openEmojiTray(event,'tab-icon-btn','tab-icon-value')" title="Choose icon">${currentIcon}</button>
            <input type="hidden" id="tab-icon-value" value="${escHtml(currentIcon)}">
            <input class="form-input" id="tab-name-input" value="${escHtml(tab.name)}" placeholder="e.g. Characters, Factions..." style="flex:1">
          </div>
        </div>
        <label class="form-label" style="margin-bottom:8px;display:block">Fields</label>
        <div class="schema-fields" id="schema-fields">${fieldsHtml}</div>
        <button class="btn-add-field" onclick="addField()">+ Add Field</button>
        ${isEdit ? `<div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border);display:flex;justify-content:flex-start"><button class="btn btn-danger" onclick="deleteTab('${tabId}')">Delete Tab</button></div>` : ''}
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="${isEdit?`saveEditTab('${tabId}')`:'saveNewTab()'}">${isEdit?'Save Changes':'Create Tab'}</button>
        </div>
      </div>
    </div>`;
}

function typeName(t) {
  return {text:'Text',number:'Number',richtext:'Rich Text',dropdown:'Dropdown',bool:'Boolean',date:'Date',image:'Image URL',relation:'Relation'}[t]||t;
}
function addField() {
  modalFields.push({ id: uid(), name: '', type: 'text' });
  const tabId = document.querySelector('.modal-footer button.btn-primary').getAttribute('onclick').includes('saveEditTab') 
    ? document.querySelector('.modal-footer button.btn-primary').getAttribute('onclick').match(/'([^']+)'/)?.[1] : null;
  refreshTabModalFields(tabId);
}
function removeField(i) { modalFields.splice(i,1); const tabId=getModalTabId(); refreshTabModalFields(tabId); }
function updateFieldName(i,v) { modalFields[i].name=v; }
function updateFieldType(i,v) { modalFields[i].type=v; delete modalFields[i].options; delete modalFields[i].relTab; const tabId=getModalTabId(); refreshTabModalFields(tabId); }
function updateFieldOpts(i,v) { modalFields[i].options=v.split(',').map(s=>s.trim()).filter(Boolean); }
function updateFieldRelTab(i,v) { modalFields[i].relTab=v; }
function getModalTabId() {
  const btn = document.querySelector('.modal-footer .btn-primary');
  if (!btn) return null;
  const m = btn.getAttribute('onclick').match(/'([^']+)'/);
  return m ? m[1] : null;
}
function buildSchemaFieldsHtml(isEdit, tabId) {
  const TYPES = ['text','number','richtext','dropdown','bool','date','image','relation'];
  return modalFields.map((f,i) => {
    const typeMenu = buildInlineSelect('schema-type-'+i, TYPES.map(t=>({value:t,label:typeName(t)})), f.type, `schemaTypePick(${i}, this)`);
    const extraHtml = f.type==='dropdown'
      ? `<div style="flex:1 1 100%;margin-top:4px"><div class="dropdown-opts-label">Options (comma separated)</div>
         <input class="dropdown-opts-input" value="${escHtml((f.options||[]).join(','))}" onchange="updateFieldOpts(${i},this.value)" placeholder="e.g. Human, Elf, Orc"></div>`
      : f.type==='relation'
      ? `<div style="flex:1 1 100%;margin-top:4px"><div class="dropdown-opts-label">Links to tab</div>
         ${buildInlineSelect('schema-rel-'+i, [{value:'',label:'— select tab —'},...db.tabs.filter(t=>!isEdit||t.id!==tabId).map(t=>({value:t.id,label:t.name}))], f.relTab||'', `schemaRelPick(${i}, this)`)}</div>`
      : '';
    return `<div class="schema-field-row" style="flex-wrap:wrap;gap:8px">
      <input value="${escHtml(f.name)}" placeholder="Field name" style="flex:1;min-width:120px" onchange="updateFieldName(${i},this.value)">
      ${typeMenu}
      ${extraHtml}
      <button class="btn-remove-field" onclick="removeField(${i})" title="Remove">✕</button>
    </div>`;
  }).join('');
}

// Compact inline custom select (no absolute positioning issues in flex rows)
function buildInlineSelect(id, options, selectedVal, onchangeExpr) {
  const sel = options.find(o=>o.value===selectedVal);
  const label = sel ? escHtml(sel.label) : escHtml(options[0]?.label||'—');
  const isPlaceholder = !sel || sel.value === '';
  const optItems = options.map(o=>`<div class="isel-opt ${o.value===selectedVal?'isel-selected':''}" data-val="${escHtml(o.value)}" data-label="${escHtml(o.label)}" data-placeholder="${!o.value?'1':''}" data-cb="${escHtml(onchangeExpr)}" onclick="iselPick('${id}',this)">${escHtml(o.label)}</div>`).join('');
  return `<div class="isel-wrap" id="isel-${id}">
    <input type="hidden" id="${id}-hidden" value="${escHtml(selectedVal)}">
    <div class="isel-trigger" onclick="iselToggle('${id}')">
      <span class="isel-label ${isPlaceholder?'isel-dim':''}" id="isel-label-${id}">${label}</span>
      <span class="isel-arrow">▼</span>
    </div>
    <div class="isel-menu" id="isel-menu-${id}">${optItems}</div>
  </div>`;
}

function iselToggle(id) {
  const menu = document.getElementById('isel-menu-'+id);
  const trigger = document.querySelector(`#isel-${id} .isel-trigger`);
  const isOpen = menu.classList.contains('open');
  document.querySelectorAll('.isel-menu.open').forEach(m=>{ m.classList.remove('open'); m.previousElementSibling?.classList.remove('open'); });
  if (!isOpen) { menu.classList.add('open'); trigger.classList.add('open'); }
}

function iselPick(id, optEl) {
  const value = optEl.dataset.val;
  const label = optEl.dataset.label;
  const isPlaceholder = optEl.dataset.placeholder === '1';
  const cbExpr = optEl.dataset.cb;
  document.getElementById(id+'-hidden').value = value;
  const lbl = document.getElementById('isel-label-'+id);
  lbl.textContent = label;
  lbl.className = 'isel-label' + (isPlaceholder ? ' isel-dim' : '');
  const menu = document.getElementById('isel-menu-'+id);
  menu.querySelectorAll('.isel-opt').forEach(o=>o.classList.remove('isel-selected'));
  optEl.classList.add('isel-selected');
  menu.classList.remove('open');
  menu.previousElementSibling?.classList.remove('open');
  // run callback
  if (cbExpr) {
    try { eval(cbExpr.replace(/this/g, `document.getElementById('${id}-hidden')`)); } catch(e){}
  }
}

function schemaTypePick(i, hiddenEl) { updateFieldType(i, hiddenEl.value); }
function schemaRelPick(i, hiddenEl) { updateFieldRelTab(i, hiddenEl.value); }

function refreshTabModalFields(tabId) {
  document.getElementById('schema-fields').innerHTML = buildSchemaFieldsHtml(!!tabId, tabId);
}

function saveNewTab() {
  const name = document.getElementById('tab-name-input').value.trim();
  if (!name) return alert('Please enter a tab name.');
  const id = uid();
  const icon = document.getElementById('tab-icon-value')?.value || '📁';
  const tab = { id, worldId: view.worldId, name, icon, fields: modalFields.filter(f=>f.name) };
  db.tabs.push(tab);
  db.entries[id] = [];
  saveTabOnly(tab);
  closeModal(); view.tabId = id; view.page = 'tab'; render();
}
function saveEditTab(tabId) {
  const name = document.getElementById('tab-name-input').value.trim();
  if (!name) return alert('Please enter a tab name.');
  const tab = db.tabs.find(t=>t.id===tabId);
  tab.name = name;
  tab.icon = document.getElementById('tab-icon-value')?.value || tab.icon || '📁';
  tab.fields = modalFields.filter(f=>f.name);
  saveTabOnly(tab);
  closeModal(); render();
}
function deleteTab(tabId) {
  if (!confirm('Delete this tab and all its entries?')) return;
  const tab = db.tabs.find(t=>t.id===tabId);
  const worldId = tab?.worldId || view.worldId;
  db.tabs = db.tabs.filter(t=>t.id!==tabId);
  delete db.entries[tabId];
  deleteTabFromDB(tabId);
  closeModal(); view.worldId = worldId; goWorld(worldId);
}
