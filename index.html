// ── ENTRY MODALS ──
function openNewEntryModal(tabId) { showEntryModal(tabId, null); }
function openEditEntryModal(tabId, entryId) { showEntryModal(tabId, entryId); }

function showEntryModal(tabId, entryId) {
  const tab = db.tabs.find(t=>t.id===tabId);
  const entry = entryId ? (db.entries[tabId]||[]).find(e=>e.id===entryId) : null;
  const isEdit = !!entry;
  const data = entry ? {...entry.data} : {};
  const tags = entry ? (entry.tags||[]).join(', ') : '';

  const fieldsHtml = tab.fields.map(f => {
    const v = data[f.id] !== undefined ? data[f.id] : '';
    let inputHtml = '';
    if (f.type === 'text' || f.type === 'image') {
      inputHtml = `<input class="form-input" id="field-${f.id}" value="${escHtml(String(v))}" placeholder="${f.type==='image'?'https://...':f.name}">`;
    } else if (f.type === 'number') {
      inputHtml = `<input class="form-input" type="number" id="field-${f.id}" value="${escHtml(String(v))}">`;
    } else if (f.type === 'richtext') {
      inputHtml = buildRTE(f.id, String(v));
    } else if (f.type === 'dropdown') {
      const opts = [{ value: '', label: '— select —', placeholder: true }, ...(f.options||[]).map(o=>({ value: o, label: o }))];
      inputHtml = buildCustomSelect('field-'+f.id, opts, String(v));
    } else if (f.type === 'bool') {
      inputHtml = `<label style="display:flex;align-items:center;gap:8px;color:var(--text)"><input type="checkbox" id="field-${f.id}" ${v?'checked':''}> Yes</label>`;
    } else if (f.type === 'date') {
      inputHtml = `<input class="form-input" type="date" id="field-${f.id}" value="${escHtml(String(v))}">`;
    } else if (f.type === 'relation') {
      const relTab = db.tabs.find(t=>t.id===f.relTab);
      const relOpts = [{ value: '', label: '— none —', placeholder: true }, ...(relTab ? (db.entries[relTab.id]||[]).map(e=>({ value: e.id, label: getNameField(relTab, e) })) : [])];
      inputHtml = buildCustomSelect('field-'+f.id, relOpts, String(v));
    }
    return `<div class="form-group"><label class="form-label">${escHtml(f.name)}</label>${inputHtml}</div>`;
  }).join('');

  const statusOpts = [
    { value: 'draft', label: '⬜ Draft' },
    { value: 'planned', label: '🔵 Planned' },
    { value: 'inprogress', label: '🟡 In Progress' },
    { value: 'complete', label: '🟢 Complete' },
  ];
  const currentStatus = entry?.status || 'draft';

  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal modal-wide">
        <div class="modal-title"><span>${getIcon(tab)}</span> ${isEdit?'Edit':'New'} ${escHtml(tab.name)} Entry</div>
        ${fieldsHtml}
        <div class="form-group">
          <label class="form-label">Tags (comma separated)</label>
          <input class="form-input" id="entry-tags" value="${escHtml(tags)}" placeholder="e.g. hero, dragon, ancient">
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          ${buildCustomSelect('entry-status', statusOpts, currentStatus)}
        </div>
        <div class="modal-footer">
          ${isEdit?`<button class="btn btn-danger" onclick="deleteEntry('${tabId}','${entryId}')">Delete</button>`:''}
          <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveEntry('${tabId}','${entryId||''}','${isEdit}')">${isEdit?'Save Changes':'Create Entry'}</button>
        </div>
      </div>
    </div>`;
  setTimeout(initRTEListeners, 0);
}

function saveEntry(tabId, entryId, isEditStr) {
  const isEdit = isEditStr === 'true';
  const tab = db.tabs.find(t=>t.id===tabId);
  const data = {};
  tab.fields.forEach(f => {
    if (f.type === 'richtext') {
      data[f.id] = getRTEHtml(f.id);
      return;
    }
    const el = document.getElementById('field-'+f.id);
    if (!el) return;
    if (f.type === 'bool') data[f.id] = el.checked;
    else if (f.type === 'number') data[f.id] = el.value !== '' ? Number(el.value) : '';
    else if (f.type === 'dropdown' || f.type === 'relation') data[f.id] = el.value;
    else data[f.id] = el.value;
  });
  const tagsRaw = document.getElementById('entry-tags').value;
  const tags = tagsRaw.split(',').map(s=>s.trim()).filter(Boolean);

  if (isEdit) {
    const entry = (db.entries[tabId]||[]).find(e=>e.id===entryId);
    if (entry) {
      entry.data = data; entry.tags = tags;
      entry.status = document.getElementById('entry-status')?.value || entry.status || 'draft';
      saveEntryToDB(tabId, entry);
    }
  } else {
    if (!db.entries[tabId]) db.entries[tabId] = [];
    const id = uid();
    const entry = { id, data, tags, status: document.getElementById('entry-status')?.value || 'draft', starred: false, createdAt: Date.now() };
    db.entries[tabId].push(entry);
    saveEntryToDB(tabId, entry);
    view.entryId = id;
  }
  closeModal();
  if (isEdit) { render(); }
  else { view.page = 'entry'; view.tabId = tabId; render(); }
}

function deleteEntry(tabId, entryId) {
  if (!confirm('Delete this entry?')) return;
  db.entries[tabId] = (db.entries[tabId]||[]).filter(e=>e.id!==entryId);
  deleteEntryFromDB(entryId);
  closeModal(); goTab(tabId);
}

// ── CUSTOM SELECT ──
function buildCustomSelect(id, options, selectedVal) {
  const sel = options.find(o => o.value === selectedVal && !o.placeholder);
  const labelText = sel ? escHtml(sel.label) : `<span class="csel-placeholder">${escHtml(options[0]?.label || '— select —')}</span>`;
  const optionsHtml = options.map(o => `
    <div class="csel-option ${o.placeholder ? 'placeholder-opt' : ''} ${o.value === selectedVal ? 'selected' : ''}"
      data-val="${escHtml(o.value)}" data-label="${escHtml(o.label)}" data-ph="${o.placeholder?'1':'0'}"
      onclick="cselPick('${id}', this.dataset.val, this.dataset.label, this.dataset.ph==='1')">
      ${escHtml(o.label)}
    </div>`).join('');
  return `<div class="csel-wrap" id="csel-wrap-${id}">
    <input type="hidden" id="${id}" value="${escHtml(selectedVal)}">
    <div class="csel-trigger" id="csel-trigger-${id}" onclick="cselToggle('${id}')">
      <span id="csel-label-${id}">${labelText}</span>
      <span class="csel-arrow">▼</span>
    </div>
    <div class="csel-dropdown" id="csel-dropdown-${id}">${optionsHtml}</div>
  </div>`;
}

function cselToggle(id) {
  const trigger = document.getElementById('csel-trigger-'+id);
  const dropdown = document.getElementById('csel-dropdown-'+id);
  const isOpen = dropdown.classList.contains('open');
  // close all others
  document.querySelectorAll('.csel-dropdown.open').forEach(d => {
    d.classList.remove('open');
    d.previousElementSibling?.classList.remove('open');
  });
  if (!isOpen) {
    dropdown.classList.add('open');
    trigger.classList.add('open');
  }
}

function cselPick(id, value, label, isPlaceholder) {
  document.getElementById(id).value = value;
  const labelEl = document.getElementById('csel-label-'+id);
  labelEl.innerHTML = isPlaceholder ? `<span class="csel-placeholder">${escHtml(label)}</span>` : escHtml(label);
  const dropdown = document.getElementById('csel-dropdown-'+id);
  dropdown.querySelectorAll('.csel-option').forEach(opt => opt.classList.remove('selected'));
  // find and mark the selected option
  dropdown.querySelectorAll('.csel-option').forEach(opt => {
    if (opt.getAttribute('onclick') && opt.getAttribute('onclick').includes(`'${value}'`)) opt.classList.add('selected');
  });
  dropdown.classList.remove('open');
  document.getElementById('csel-trigger-'+id)?.classList.remove('open');
}

// Close dropdowns when clicking outside
document.addEventListener('click', e => {
  if (!e.target.closest('.csel-wrap')) {
    document.querySelectorAll('.csel-dropdown.open').forEach(d => {
      d.classList.remove('open');
      d.previousElementSibling?.classList.remove('open');
    });
  }
  if (!e.target.closest('.isel-wrap')) {
    document.querySelectorAll('.isel-menu.open').forEach(m => {
      m.classList.remove('open');
      m.previousElementSibling?.classList.remove('open');
    });
  }
});

// ── RICH TEXT EDITOR ──
function buildRTE(fieldId, initialHtml) {
  return `<div class="rte-wrap">
    <div class="rte-toolbar" id="rte-toolbar-${fieldId}" onmousedown="event.preventDefault()">
      <button class="rte-btn" data-cmd="bold" onclick="rteCmd('bold','${fieldId}')" title="Bold"><b>B</b></button>
      <button class="rte-btn" data-cmd="italic" onclick="rteCmd('italic','${fieldId}')" title="Italic"><i>I</i></button>
      <button class="rte-btn" data-cmd="underline" onclick="rteCmd('underline','${fieldId}')" title="Underline"><u>U</u></button>
      <button class="rte-btn" data-cmd="strikeThrough" onclick="rteCmd('strikeThrough','${fieldId}')" title="Strikethrough"><s>S</s></button>
      <div class="rte-sep"></div>
      <button class="rte-btn" data-cmd="txt" onclick="rteSetBlock('div','${fieldId}')" title="Normal text">Txt</button>
      <button class="rte-btn" data-cmd="h1" onclick="rteSetBlock('h1','${fieldId}')" title="Heading 1">H1</button>
      <button class="rte-btn" data-cmd="h2" onclick="rteSetBlock('h2','${fieldId}')" title="Heading 2">H2</button>
      <button class="rte-btn" data-cmd="h3" onclick="rteSetBlock('h3','${fieldId}')" title="Heading 3">H3</button>
      <div class="rte-sep"></div>
      <button class="rte-btn" data-cmd="insertUnorderedList" onclick="rteCmd('insertUnorderedList','${fieldId}')" title="Bullet list">• List</button>
      <button class="rte-btn" data-cmd="insertOrderedList" onclick="rteCmd('insertOrderedList','${fieldId}')" title="Numbered list">1. List</button>
      <button class="rte-btn" data-cmd="blockquote" onclick="rteSetBlock('blockquote','${fieldId}')" title="Quote">❝</button>
      <div class="rte-sep"></div>
      <button class="rte-btn" onclick="rteClearFormat('${fieldId}')" title="Clear all formatting">✕ fmt</button>
      <div class="rte-sep"></div>
      <button class="rte-btn rte-focus-btn" onclick="openRTEFocus('${fieldId}')" title="Focus mode">⤢ Focus</button>
    </div>
    <div class="rte-editor" id="rte-editor-${fieldId}" contenteditable="true"
      data-placeholder="Write your lore here… type @ to link an entry" spellcheck="false"
      onkeyup="rteUpdateToolbar('${fieldId}')" onmouseup="rteUpdateToolbar('${fieldId}')">${initialHtml}</div>
  </div>`;
}

// Hook up @mention and toolbar state after modal is in DOM
function initRTEListeners() {
  document.querySelectorAll('.rte-editor').forEach(ed => {
    const fieldId = ed.id.replace('rte-editor-', '');
    setupAtMention(fieldId);
    ed.addEventListener('focus', () => rteUpdateToolbar(fieldId));
    ed.addEventListener('click', () => rteUpdateToolbar(fieldId));
  });
}

function rteCmd(cmd, fieldId) {
  document.execCommand(cmd, false, null);
  rteUpdateToolbar(fieldId);
}

function rteSetBlock(tag, fieldId) {
  const editor = document.getElementById('rte-editor-' + fieldId);
  if (!editor) return;
  const sel = window.getSelection();
  if (!sel.rangeCount) return;

  if (tag === 'div') {
    // "Txt" — convert current block back to plain paragraph
    document.execCommand('formatBlock', false, 'div');
  } else if (tag === 'blockquote') {
    document.execCommand('formatBlock', false, 'blockquote');
  } else {
    // h1/h2/h3 — check if already that block, toggle off to div
    const current = document.queryCommandValue('formatBlock').toLowerCase();
    if (current === tag) {
      document.execCommand('formatBlock', false, 'div');
    } else {
      document.execCommand('formatBlock', false, tag);
    }
  }
  rteUpdateToolbar(fieldId);
}

function rteClearFormat(fieldId) {
  const editor = document.getElementById('rte-editor-' + fieldId);
  if (!editor) return;
  document.execCommand('removeFormat', false, null);
  document.execCommand('formatBlock', false, 'div');
  // Also remove mark tags
  editor.querySelectorAll('mark').forEach(m => {
    const parent = m.parentNode;
    while (m.firstChild) parent.insertBefore(m.firstChild, m);
    parent.removeChild(m);
  });
  rteUpdateToolbar(fieldId);
}

function rteUpdateToolbar(fieldId) {
  const toolbar = document.getElementById('rte-toolbar-' + fieldId);
  if (!toolbar) return;

  // Simple inline commands
  const checks = {
    bold: document.queryCommandState('bold'),
    italic: document.queryCommandState('italic'),
    underline: document.queryCommandState('underline'),
    strikeThrough: document.queryCommandState('strikeThrough'),
    insertUnorderedList: document.queryCommandState('insertUnorderedList'),
    insertOrderedList: document.queryCommandState('insertOrderedList'),
  };

  // Block-level check
  const block = document.queryCommandValue('formatBlock').toLowerCase();
  checks.h1 = block === 'h1';
  checks.h2 = block === 'h2';
  checks.h3 = block === 'h3';
  checks.blockquote = block === 'blockquote';
  checks.txt = !['h1','h2','h3','blockquote'].includes(block);

  toolbar.querySelectorAll('.rte-btn[data-cmd]').forEach(btn => {
    const cmd = btn.dataset.cmd;
    btn.classList.toggle('active', !!checks[cmd]);
  });
}

// ── RTE FOCUS MODE ──
function openRTEFocus(fieldId) {
  const editor = document.getElementById('rte-editor-' + fieldId);
  if (!editor) return;
  const content = editor.innerHTML;
  const fieldLabel = editor.closest('.form-group')?.querySelector('.form-label')?.textContent || 'Rich Text';

  const overlay = document.createElement('div');
  overlay.className = 'rte-focus-overlay';
  overlay.id = 'rte-focus-overlay';

  overlay.innerHTML = `
    <div class="rte-focus-box">
      <div class="rte-focus-header">
        <span class="rte-focus-label">✦ Focus — ${escHtml(fieldLabel)}</span>
        <button class="rte-focus-done" onclick="closeRTEFocus('${fieldId}')">Done ↩</button>
      </div>
      <div class="rte-focus-toolbar" id="rte-focus-toolbar" onmousedown="event.preventDefault()">
        <button class="rte-btn" data-cmd="bold" onclick="rteFocusCmd('bold')" title="Bold"><b>B</b></button>
        <button class="rte-btn" data-cmd="italic" onclick="rteFocusCmd('italic')" title="Italic"><i>I</i></button>
        <button class="rte-btn" data-cmd="underline" onclick="rteFocusCmd('underline')" title="Underline"><u>U</u></button>
        <button class="rte-btn" data-cmd="strikeThrough" onclick="rteFocusCmd('strikeThrough')" title="Strikethrough"><s>S</s></button>
        <div class="rte-sep"></div>
        <button class="rte-btn" data-cmd="txt" onclick="rteFocusBlock('div')" title="Normal">Txt</button>
        <button class="rte-btn" data-cmd="h1" onclick="rteFocusBlock('h1')" title="H1">H1</button>
        <button class="rte-btn" data-cmd="h2" onclick="rteFocusBlock('h2')" title="H2">H2</button>
        <button class="rte-btn" data-cmd="h3" onclick="rteFocusBlock('h3')" title="H3">H3</button>
        <div class="rte-sep"></div>
        <button class="rte-btn" data-cmd="insertUnorderedList" onclick="rteFocusCmd('insertUnorderedList')" title="Bullet">• List</button>
        <button class="rte-btn" data-cmd="insertOrderedList" onclick="rteFocusCmd('insertOrderedList')" title="Numbered">1. List</button>
        <button class="rte-btn" data-cmd="blockquote" onclick="rteFocusBlock('blockquote')" title="Quote">❝</button>
        <div class="rte-sep"></div>
        <button class="rte-btn" onclick="rteFocusClear()" title="Clear formatting">✕ fmt</button>
      </div>
      <div class="rte-focus-editor" id="rte-focus-editor" contenteditable="true"
        data-placeholder="Write your lore here…" spellcheck="false"
        onkeyup="rteFocusUpdateToolbar()" onmouseup="rteFocusUpdateToolbar()">${content}</div>
      <div class="rte-focus-wc" id="rte-focus-wc">0 words</div>
    </div>`;

  document.body.appendChild(overlay);

  const focusEditor = document.getElementById('rte-focus-editor');
  focusEditor.focus();
  // Move cursor to end
  const range = document.createRange();
  range.selectNodeContents(focusEditor);
  range.collapse(false);
  const sel = window.getSelection();
  sel.removeAllRanges(); sel.addRange(range);

  // Word count
  focusEditor.addEventListener('input', rteFocusWordCount);
  rteFocusWordCount();

  // ESC to close
  overlay._escHandler = e => { if (e.key === 'Escape') closeRTEFocus(fieldId); };
  document.addEventListener('keydown', overlay._escHandler);
}

function closeRTEFocus(fieldId) {
  const overlay = document.getElementById('rte-focus-overlay');
  const focusEditor = document.getElementById('rte-focus-editor');
  const editor = document.getElementById('rte-editor-' + fieldId);
  if (focusEditor && editor) editor.innerHTML = focusEditor.innerHTML;
  if (overlay) {
    document.removeEventListener('keydown', overlay._escHandler);
    overlay.remove();
  }
  rteUpdateToolbar(fieldId);
}

function rteFocusCmd(cmd) {
  document.execCommand(cmd, false, null);
  rteFocusUpdateToolbar();
}

function rteFocusBlock(tag) {
  if (tag === 'div') { document.execCommand('formatBlock', false, 'div'); }
  else if (tag === 'blockquote') { document.execCommand('formatBlock', false, 'blockquote'); }
  else {
    const cur = document.queryCommandValue('formatBlock').toLowerCase();
    document.execCommand('formatBlock', false, cur === tag ? 'div' : tag);
  }
  rteFocusUpdateToolbar();
}

function rteFocusClear() {
  const ed = document.getElementById('rte-focus-editor');
  if (!ed) return;
  document.execCommand('removeFormat', false, null);
  document.execCommand('formatBlock', false, 'div');
  rteFocusUpdateToolbar();
}

function rteFocusUpdateToolbar() {
  const toolbar = document.getElementById('rte-focus-toolbar');
  if (!toolbar) return;
  const block = document.queryCommandValue('formatBlock').toLowerCase();
  const checks = {
    bold: document.queryCommandState('bold'),
    italic: document.queryCommandState('italic'),
    underline: document.queryCommandState('underline'),
    strikeThrough: document.queryCommandState('strikeThrough'),
    insertUnorderedList: document.queryCommandState('insertUnorderedList'),
    insertOrderedList: document.queryCommandState('insertOrderedList'),
    h1: block === 'h1', h2: block === 'h2', h3: block === 'h3',
    blockquote: block === 'blockquote',
    txt: !['h1','h2','h3','blockquote'].includes(block),
  };
  toolbar.querySelectorAll('.rte-btn[data-cmd]').forEach(btn => {
    btn.classList.toggle('active', !!checks[btn.dataset.cmd]);
  });
}

function rteFocusWordCount() {
  const ed = document.getElementById('rte-focus-editor');
  const wc = document.getElementById('rte-focus-wc');
  if (!ed || !wc) return;
  const words = (ed.innerText || '').trim().split(/\s+/).filter(Boolean).length;
  wc.textContent = `${words} word${words !== 1 ? 's' : ''}`;
}

async function settingsConnectSupabase() {
  const url = document.getElementById('sdb-sb-url')?.value.trim();
  const key = document.getElementById('sdb-sb-key')?.value.trim();
  const statusEl = document.getElementById('settings-db-status');
  const errorEl  = document.getElementById('settings-db-error');
  if (!url || !key) { if(errorEl){errorEl.textContent='Please enter both URL and key.';errorEl.style.display='block';} return; }
  if (statusEl) statusEl.textContent = 'Connecting…';
  if (errorEl)  errorEl.style.display = 'none';
  try {
    sbClient = null; // clear old instance first
    const client = window.supabase.createClient(url, key);
    try { await ensureSupabaseTables(client); }
    catch(e) { if(e.message?.includes('fetch')){ await new Promise(r=>setTimeout(r,1200)); await ensureSupabaseTables(client); } else throw e; }
    sbClient = client; dbProvider = 'supabase'; dbConnected = true;
    saveCreds('supabase', { url, key });
    updateConnDot(true);
    if (statusEl) statusEl.textContent = '';
    await loadDB(); render();
    showToast('Connected to Supabase ✓', 'success');
    switchSettingsSection('database');
  } catch(e) {
    if (statusEl) statusEl.textContent = '';
    if (errorEl) { errorEl.textContent = 'Connection failed: ' + (e.message||e.details||String(e)); errorEl.style.display='block'; }
    console.error('DB connect error:', e);
  }
}

async function settingsConnectTurso() {
  const url   = document.getElementById('sdb-turso-url')?.value.trim();
  const token = document.getElementById('sdb-turso-token')?.value.trim();
  const statusEl = document.getElementById('settings-db-status');

function disconnectDB() {

function onSettingsIframeLoad(iframe) {
  sendThemeToIframe(iframe);
  if (iframe.id === 'export-iframe') {
    iframe.contentWindow.postMessage({
      type: 'export-data',
      data: { worlds: db.worlds, tabs: db.tabs, entries: db.entries }
    }, '*');
  }
  // Fade iframe in and hide loading indicator
  iframe.classList.add('loaded');
  const loading = iframe.closest('.iframe-wrap')?.querySelector('.iframe-loading');
  if (loading) loading.style.display = 'none';
}

function sendThemeToIframe(iframe) {
  if (!iframe?.contentWindow) return;
  // Collect current CSS var values
  const style = getComputedStyle(document.documentElement);
  const vars = {};
  ['--void','--glow','--glow2','--glow3','--text','--text-dim','--text-bright','--accent','--border','--border-bright'].forEach(v => {
    vars[v] = style.getPropertyValue(v).trim();
  });
  iframe.contentWindow.postMessage({ type: 'set-theme', theme: appSettings.theme, vars }, '*');
}

// Listen for messages from iframes
window.addEventListener('message', e => {
  if (e.data?.type === 'request-theme') {
    document.querySelectorAll('.settings-iframe').forEach(iframe => sendThemeToIframe(iframe));
  }
  if (e.data?.type === 'request-export-data') {
    const iframe = document.getElementById('export-iframe');
    if (iframe) iframe.contentWindow.postMessage({
      type: 'export-data',
      data: { worlds: db.worlds, tabs: db.tabs, entries: db.entries }
    }, '*');
  }
  if (e.data?.type === 'import-world') {
    handleImportWorld(e.data.data);
  }
});

async function handleImportWorld(data) {
  try {
    const { world, tabs, entries } = data;
    // Give it a new ID to avoid collision
    const newWorldId = uid();
    const idMap = { [world.id]: newWorldId };
    world.id = newWorldId;
    db.worlds.push(world);
    await saveWorldToDB(world);

    for (const tab of tabs) {
      const newTabId = uid();
      idMap[tab.id] = newTabId;
      tab.id = newTabId;
      tab.worldId = newWorldId;
      db.tabs.push(tab);
      db.entries[newTabId] = [];
      await saveTabOnly(tab);
    }

    for (const [oldTabId, entryList] of Object.entries(entries)) {
      const newTabId = idMap[oldTabId];
      if (!newTabId) continue;
      for (const entry of entryList) {
        entry.id = uid();
        db.entries[newTabId] = db.entries[newTabId] || [];
        db.entries[newTabId].push(entry);
        await saveEntryToDB(newTabId, entry);
      }
    }

    const iframe = document.getElementById('export-iframe');
    if (iframe) iframe.contentWindow.postMessage({ type: 'import-done', worldName: world.name }, '*');
    showToast(`"${world.name}" imported ✓`, 'success');
    render();
  } catch(err) {
    const iframe = document.getElementById('export-iframe');
    if (iframe) iframe.contentWindow.postMessage({ type: 'import-error', message: err.message }, '*');
    showToast('Import failed: ' + err.message, 'error');
  }
}

// ── STAR / DUPLICATE ──
function toggleStar(tabId, entryId) {
  const entry = (db.entries[tabId]||[]).find(e=>e.id===entryId);
  if (!entry) return;
  entry.starred = !entry.starred;
  saveEntryToDB(tabId, entry);
  render();
}

function duplicateEntry(tabId, entryId) {
  const tab = db.tabs.find(t=>t.id===tabId);
  const entry = (db.entries[tabId]||[]).find(e=>e.id===entryId);
  if (!tab||!entry) return;
  const newId = uid();
  // Copy data, prefix name field with "Copy of"
  const newData = {...entry.data};
  const nameField = tab.fields.find(f=>f.name.toLowerCase()==='name')||tab.fields[0];
  if (nameField && newData[nameField.id]) newData[nameField.id] = 'Copy of ' + newData[nameField.id];
  const newEntry = { id: newId, data: newData, tags: [...(entry.tags||[])], status: entry.status||'draft', starred: false, createdAt: Date.now() };
  db.entries[tabId].push(newEntry);
  saveEntryToDB(tabId, newEntry);
  showToast('Entry duplicated ✓', 'success');
  view.entryId = newId; view.tabId = tabId; view.page = 'entry'; render();
}

          <span class="search-close" onclick="closeModal()">✕</span>
        </div>
        <div class="search-results-list" id="search-results-list">
          <div class="search-empty">Start typing to search across all your worlds…</div>
        </div>
      </div>
    </div>`;
  setTimeout(() => document.getElementById('global-search-q')?.focus(), 50);

function runGlobalSearch(q) {
  const el = document.getElementById('search-results-list');
  if (!q.trim()) { el.innerHTML = '<div class="search-empty">Start typing to search across all your worlds…</div>'; return; }
  const ql = q.toLowerCase();
  const results = [];
  db.tabs.forEach(tab => {
    const world = db.worlds.find(w=>w.id===tab.worldId);
    (db.entries[tab.id]||[]).forEach(entry => {
      const name = getNameField(tab, entry);
      const tags = (entry.tags||[]).join(' ');
      const textFields = tab.fields.filter(f=>f.type==='text'||f.type==='richtext').map(f=>String(entry.data[f.id]||'')).join(' ');
      const haystack = (name+' '+tags+' '+textFields).toLowerCase();
      if (haystack.includes(ql)) {
        results.push({ tab, entry, name, world });
      }
    });
  });
  if (!results.length) { el.innerHTML = '<div class="search-empty">No results found.</div>'; return; }
  el.innerHTML = results.slice(0,40).map(r => `
    <div class="search-result-item" onclick="closeModal();goEntry('${r.tab.id}','${r.entry.id}')">
      <span class="search-result-icon">${getIcon(r.tab.name)}</span>
      <div>
        <div class="search-result-name">${escHtml(r.name)}</div>
        <div class="search-result-meta"><em>${escHtml(r.world?.name||'')}</em> › ${escHtml(r.tab.name)} · ${statusHtml(r.entry.status||'draft')}</div>
      </div>
      ${r.entry.starred ? '<span style="color:#fbbf24;margin-left:auto">★</span>' : ''}
    </div>`).join('');
}

// In rich text fields, @word triggers an autocomplete popup
let atMentionState = null;

function setupAtMention(editorId) {
  const editor = document.getElementById('rte-editor-' + editorId);
  if (!editor) return;
  editor.addEventListener('input', e => handleAtInput(editor, editorId));
  editor.addEventListener('keydown', e => handleAtKeydown(e, editorId));
}

function handleAtInput(editor, editorId) {
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  const text = range.startContainer.textContent || '';
  const pos = range.startOffset;
  const before = text.slice(0, pos);
  const match = before.match(/@(\w*)$/);
  if (match) {
    const query = match[1].toLowerCase();
    showAtMenu(editor, query, match[0].length);
  } else {
    closeAtMenu();
  }
}

function handleAtKeydown(e, editorId) {
  if (!atMentionState) return;
  const menu = document.getElementById('at-menu');
  if (!menu) return;
  const items = menu.querySelectorAll('.at-item');
  if (e.key === 'ArrowDown') { e.preventDefault(); atMentionState.idx = Math.min(atMentionState.idx+1, items.length-1); items.forEach((it,i)=>it.classList.toggle('active',i===atMentionState.idx)); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); atMentionState.idx = Math.max(atMentionState.idx-1, 0); items.forEach((it,i)=>it.classList.toggle('active',i===atMentionState.idx)); }
  else if (e.key === 'Enter' && items[atMentionState.idx]) { e.preventDefault(); items[atMentionState.idx].click(); }
  else if (e.key === 'Escape') closeAtMenu();
}

function showAtMenu(editor, query, atLen) {
  const allEntries = [];
  db.tabs.forEach(tab => {
    (db.entries[tab.id]||[]).forEach(entry => {
      const name = getNameField(tab, entry);
      if (!query || name.toLowerCase().includes(query)) allEntries.push({ tab, entry, name });
    });
  });
  if (!allEntries.length) { closeAtMenu(); return; }
  const rect = window.getSelection().getRangeAt(0).getBoundingClientRect();
  let menu = document.getElementById('at-menu');
  if (!menu) { menu = document.createElement('div'); menu.id = 'at-menu'; document.body.appendChild(menu); }
  menu.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.bottom+4}px;z-index:9999;
    background:#0d0820;border:1px solid rgba(180,143,255,0.35);border-radius:8px;
    min-width:220px;max-height:200px;overflow-y:auto;
    box-shadow:0 8px 32px rgba(0,0,0,0.7);font-family:'Crimson Pro',serif`;
  menu.innerHTML = allEntries.slice(0,10).map((r,i)=>`
    <div class="at-item" style="padding:8px 12px;cursor:pointer;display:flex;gap:8px;align-items:center;${i===0?'background:rgba(180,143,255,0.1)':''}"
      data-tabid="${escHtml(r.tab.id)}"
      data-entryid="${escHtml(r.entry.id)}"
      data-name="${escHtml(r.name)}"
      data-atlen="${atLen}"
      onmouseenter="this.parentElement.querySelectorAll('.at-item').forEach((el,j)=>el.style.background=j===${i}?'rgba(180,143,255,0.1)':'');atMentionState&&(atMentionState.idx=${i})"
      onclick="insertAtLink(this.dataset.tabid,this.dataset.entryid,this.dataset.name,this.dataset.atlen)">
      <span>${getIcon(r.tab.name)}</span>
      <span style="color:#f0ecff;font-size:14px">${escHtml(r.name)}</span>
      <span style="color:#7a6fa8;font-size:11px;font-family:'JetBrains Mono',monospace;margin-left:auto">${escHtml(r.tab.name)}</span>
    </div>`).join('');
  atMentionState = { idx: 0, atLen };
}

function insertAtLink(tabId, entryId, name, atLen) {
  closeAtMenu();
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  const node = range.startContainer;
  const pos = range.startOffset;
  // Remove the @query text
  const deleteRange = document.createRange();
  deleteRange.setStart(node, pos - atLen);
  deleteRange.setEnd(node, pos);
  deleteRange.deleteContents();
  // Insert the link span
  const link = document.createElement('span');
  link.className = 'entry-link';
  link.dataset.tabId = tabId;
  link.dataset.entryId = entryId;
  link.contentEditable = 'false';
  // Store as special syntax that we can resolve on render
  link.textContent = name;
  link.setAttribute('data-link', `@[${name}](${tabId}:${entryId})`);
  // On click in editor, navigate
  link.onclick = () => { closeModal(); goEntry(tabId, entryId); };
  range.insertNode(link);
  // Move cursor after link
  const after = document.createRange();
  after.setStartAfter(link); after.collapse(true);
  sel.removeAllRanges(); sel.addRange(after);
}

function closeAtMenu() {
  atMentionState = null;
  document.getElementById('at-menu')?.remove();
}

// Override getRTEContent to serialize entry links as @[name](tabId:entryId)
function getRTEHtml(editorId) {
  const editor = document.getElementById('rte-editor-' + editorId);
  if (!editor) return '';
  // Replace link spans with their data-link attribute value
  const clone = editor.cloneNode(true);
  clone.querySelectorAll('[data-link]').forEach(el => {
    el.replaceWith(el.getAttribute('data-link'));
  });
  return clone.innerHTML;
}

let emojiTrayState = { targetBtnId: null, targetValueId: null, activeTab: 'emoji', customIcons: [] };

async function openEmojiTray(e, btnId, valueId) {
  e.stopPropagation();
  closeEmojiTray();
  emojiTrayState = { targetBtnId: btnId, targetValueId: valueId, activeTab: 'emoji', customIcons: [] };

  const btn = document.getElementById(btnId);
  const rect = btn.getBoundingClientRect();

  const tray = document.createElement('div');
  tray.className = 'emoji-tray';
  tray.id = 'emoji-tray';

  const top = Math.min(rect.bottom + 6, window.innerHeight - 320);
  const left = Math.min(rect.left, window.innerWidth - 348);
  tray.style.top = top + 'px';
  tray.style.left = left + 'px';

  document.body.appendChild(tray);
  renderEmojiTray('emoji', '');

  // Attach outside-click listener after tray is in DOM
  setTimeout(() => document.addEventListener('click', onEmojiOutside, true), 0);

  // Load custom icons in background, re-render if on custom tab
  try {
    const resp = await fetch('./assets/icons/icons.json');
    if (resp.ok) {
      const list = await resp.json();
      emojiTrayState.customIcons = list.map(f => `./assets/icons/${f}`);
      if (emojiTrayState.activeTab === 'custom') renderEmojiTray('custom', '');
    }
  } catch(e) { /* no custom icons */ }
}

function onEmojiOutside(e) {
  const tray = document.getElementById('emoji-tray');
  if (!tray) return;
  if (!tray.contains(e.target) && !e.target.closest('.tab-icon-btn')) {
    closeEmojiTray();
  }
}

function closeEmojiTray() {
  document.getElementById('emoji-tray')?.remove();
  document.removeEventListener('click', onEmojiOutside, true);
}

function renderEmojiTray(activeTab, query) {
  emojiTrayState.activeTab = activeTab;
  const tray = document.getElementById('emoji-tray');
  if (!tray) return;

  const tabsHtml = `
    <div class="emoji-tray-tabs">
      <button class="emoji-tray-tab ${activeTab==='emoji'?'active':''}" onclick="renderEmojiTray('emoji',document.getElementById('emoji-search')?.value||'')">Emoji</button>
      <button class="emoji-tray-tab ${activeTab==='custom'?'active':''}" onclick="renderEmojiTray('custom','')">Custom Icons</button>
    </div>`;

  const searchHtml = activeTab === 'emoji' ? `
    <div class="emoji-tray-search">
      <input id="emoji-search" placeholder="Search emoji…" value="${escHtml(query)}" oninput="renderEmojiTray('emoji',this.value)" autofocus>
    </div>` : '';

  let bodyHtml = '';
  if (activeTab === 'emoji') {
    const q = query.toLowerCase();
    const filtered = q
      ? EMOJI_CATEGORIES.map(c => ({ ...c, emojis: c.emojis.filter(() => true) })) // all for now; real search needs names
        .flatMap(c => c.emojis)
        .filter((em, i, arr) => arr.indexOf(em) === i) // dedupe
      : null;

    if (q) {
      bodyHtml = `<div class="emoji-grid">${
        EMOJI_CATEGORIES.flatMap(c=>c.emojis).filter((em,i,a)=>a.indexOf(em)===i)
          .map(em => `<div class="emoji-item" data-emoji="${escHtml(em)}" onclick="pickEmojiIcon(this.dataset.emoji)" title="${escHtml(em)}">${em}</div>`).join('')
      }</div>`;
    } else {
      bodyHtml = EMOJI_CATEGORIES.map(cat => `
        <div class="emoji-category-label">${cat.label}</div>
        <div class="emoji-grid">${cat.emojis.map(em =>
          `<div class="emoji-item" data-emoji="${escHtml(em)}" onclick="pickEmojiIcon(this.dataset.emoji)">${em}</div>`
        ).join('')}</div>
      `).join('');
    }
  } else {
    // Custom icons tab
    if (emojiTrayState.customIcons.length > 0) {
      bodyHtml = `<div class="emoji-grid" style="gap:6px">${
        emojiTrayState.customIcons.map(src =>
          `<div class="custom-icon-item" data-src="${escHtml(src)}" onclick="pickEmojiIcon(this.dataset.src)"><img src="${escHtml(src)}" onerror="this.parentElement.style.display='none'"></div>`
        ).join('')
      }</div>`;
    } else {
      bodyHtml = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:160px;gap:10px;color:var(--text-dim)">
        <div style="font-size:28px;opacity:0.3">🖼️</div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.05em">No custom icons available</div>
        <div style="font-size:12px;text-align:center;max-width:220px;line-height:1.5;opacity:0.7">Add icons to <code style="color:var(--glow);font-size:11px">assets/icons/</code> and list them in <code style="color:var(--glow);font-size:11px">icons.json</code></div>
      </div>`;
    }
  }

  tray.innerHTML = tabsHtml + searchHtml + `<div class="emoji-tray-body">${bodyHtml}</div>`;
  if (activeTab === 'emoji') setTimeout(() => document.getElementById('emoji-search')?.focus(), 0);
}

function pickEmojiIcon(value) {
  const btn = document.getElementById(emojiTrayState.targetBtnId);
  const input = document.getElementById(emojiTrayState.targetValueId);
  if (btn) {
    // If it's a path (custom icon), show as img; otherwise show emoji text
    btn.innerHTML = value.startsWith('.') || value.startsWith('http')
      ? `<img src="${escHtml(value)}" style="width:24px;height:24px;object-fit:contain">`
      : value;
  }
  if (input) input.value = value;
  closeEmojiTray();
}

// ── UTILS ──

// ── INIT ──
async function init() {
  loadAppSettings();
  const creds = getCreds();
  if (creds.provider === 'supabase' && creds.sbUrl && creds.sbKey) {
    try {
      const client = window.supabase.createClient(creds.sbUrl, creds.sbKey);
      try {
        await ensureSupabaseTables(client);
      } catch(e) {
        if (e.message?.includes('fetch')) {
          await new Promise(r => setTimeout(r, 1200));
          await ensureSupabaseTables(client);
        } else throw e;
      }
      sbClient = client; dbProvider = 'supabase'; dbConnected = true;
      updateConnDot(true);
      await loadDB(); render();
      showToast('Connected to Supabase ✓', 'success');
    } catch(e) {
      updateConnDot(false);
      openSettings('database');
      showToast('Auto-reconnect failed: ' + (e.message||e.details||'Unknown error'), 'error');
    }
  } else if (creds.provider === 'turso' && creds.tursoUrl && creds.tursoToken) {
    try {
      await ensureTursoTables(creds.tursoUrl, creds.tursoToken);
      tursoClient = { url: creds.tursoUrl, token: creds.tursoToken };
      dbProvider = 'turso'; dbConnected = true;
      updateConnDot(true);
      await loadDB(); render();
      showToast('Connected to Turso ✓', 'success');
    } catch(e) {
      updateConnDot(false);
      openSettings('database');
      showToast('Auto-reconnect failed: ' + (e.message||e.details||'Unknown error'), 'error');
    }
  } else {
    // No saved creds — open settings on Database section
    openSettings('database');
  }
  updateConsoleBadge();
}
document.addEventListener('DOMContentLoaded', () => init().catch(e => console.error('Init failed:', e)));
</script>
